# Loki single-binary mode — log storage backend.
# Single-binary means all Loki components (ingester, querier, compactor,
# distributor) run in one process. Trade-off: no horizontal scaling, but
# zero operational complexity. Right call for a homelab.
#
# Filesystem chunks (not S3) because we don't have local object storage
# and Synology's S3 emulation is more trouble than it's worth here.
# Everything sits on one Longhorn PVC.
#
# Receives Loki API push at /loki/api/v1/push on port 3100. Alloy will
# write here during Phase 3 alongside the existing Grafana Cloud target.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki.yaml: |
    # No multitenancy — single-tenant homelab use.
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      # Default log_level=info is too chatty for steady state; bump to warn
      # so Loki's own logs don't dominate the cluster log volume we're
      # trying to capture.
      log_level: warn

    common:
      instance_addr: 127.0.0.1
      path_prefix: /var/loki
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2026-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    compactor:
      working_directory: /var/loki/compactor
      delete_request_store: filesystem
      retention_enabled: true
      compaction_interval: 10m

    limits_config:
      # 30-day retention matches our 10GB disk budget assuming roughly
      # 300MB/day post-compression. Tune after burn-in.
      retention_period: 720h
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      # Per-stream rate limits prevent a single chatty pod from filling
      # the disk in hours. 5MB/s sustained per stream is generous.
      per_stream_rate_limit: 5MB
      per_stream_rate_limit_burst: 20MB
      # Cluster-wide ingest cap as a second safety net.
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      # Allow up to ~5K active streams; alerts if cardinality explodes.
      max_global_streams_per_user: 5000

    # Required by recent Loki versions even though we don't use rules.
    ruler:
      storage:
        type: local
        local:
          directory: /var/loki/rules
      rule_path: /var/loki/rules-temp
      ring:
        kvstore:
          store: inmemory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-storage
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
spec:
  replicas: 1
  # Recreate because PVC is RWO.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
      annotations:
        # Roll the pod when the config map changes.
        configHash: placeholder
    spec:
      enableServiceLinks: false
      # Loki's filesystem layout assumes UID/GID 10001 (the loki user in
      # the official image). The PVC needs to be writable by that uid.
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: loki
          image: grafana/loki:3.2.1
          args:
            - -config.file=/etc/loki/loki.yaml
            - -target=all
          ports:
            - containerPort: 3100
              name: http
            - containerPort: 9096
              name: grpc
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: storage
              mountPath: /var/loki
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: storage
          persistentVolumeClaim:
            claimName: loki-storage
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
    - name: grpc
      port: 9096
      targetPort: 9096
