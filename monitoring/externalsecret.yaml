# Pulls the Grafana Cloud access token from Vault (kv/grafana-cloud, key
# "token") into a k8s Secret named "grafana-cloud-creds". The k8s-monitoring
# Helm chart references this secret for both Prometheus and Loki basic auth
# passwords (the username is the per-service stack ID, plain text in values).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-cloud-creds
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-monitoring
    kind: SecretStore
  target:
    name: grafana-cloud-creds
    template:
      type: Opaque
      data:
        token: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: grafana-cloud
        property: token
