# Two k8s Secrets, one per Grafana Cloud destination. Each carries the full
# bag of fields the k8s-monitoring chart's "bring-your-own-secret" pattern
# expects (url, username, token, plus blanks for tls/tenantId so Alloy's
# remote.kubernetes.secret reads don't fail).
#
# Only `token` is sensitive — pulled from Vault kv/grafana-cloud, key `token`.
# The rest are stack-scoped public IDs and live in this file as literals.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-cloud-metrics
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-monitoring
    kind: SecretStore
  target:
    name: grafana-cloud-metrics
    template:
      type: Opaque
      data:
        url:      "https://prometheus-prod-13-prod-us-east-0.grafana.net/api/prom/push"
        username: "1054401"
        token:    "{{ .token }}"
        tenantId: ""
        ca:       ""
        cert:     ""
        key:      ""
  data:
    - secretKey: token
      remoteRef:
        key: grafana-cloud
        property: token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-cloud-logs
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-monitoring
    kind: SecretStore
  target:
    name: grafana-cloud-logs
    template:
      type: Opaque
      data:
        url:      "https://logs-prod-006.grafana.net/loki/api/v1/push"
        username: "628971"
        token:    "{{ .token }}"
        tenantId: ""
        ca:       ""
        cert:     ""
        key:      ""
  data:
    - secretKey: token
      remoteRef:
        key: grafana-cloud
        property: token
