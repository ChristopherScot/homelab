# Victoria Metrics single-node TSDB — Prometheus-compatible read+write API on :8428.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-metrics-storage
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  namespace: monitoring
  labels:
    app: victoria-metrics
spec:
  replicas: 1
  # Recreate: PVC is RWO, new pod can't attach until old one releases.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: victoria-metrics
  template:
    metadata:
      labels:
        app: victoria-metrics
    spec:
      enableServiceLinks: false
      containers:
        - name: victoria-metrics
          image: victoriametrics/victoria-metrics:v1.108.1
          args:
            - -storageDataPath=/storage
            - -httpListenAddr=:8428
            - -retentionPeriod=30d
            # Cheap defense against label-cardinality explosions.
            - -maxLabelsPerTimeseries=40
          ports:
            - containerPort: 8428
              name: http
          volumeMounts:
            - name: storage
              mountPath: /storage
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: victoria-metrics-storage
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  selector:
    app: victoria-metrics
  ports:
    - name: http
      port: 8428
      targetPort: 8428
