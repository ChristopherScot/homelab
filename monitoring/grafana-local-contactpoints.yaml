# Email contact point + notification policy for local Grafana alerting.
# Provisioned as code (GitOps) because the prior contact points were UI-only,
# lived only in Grafana's SQLite db, and were lost in the SQLite->Postgres
# backend migration (see GRAFANA_POSTGRES_MIGRATION.md). Declaring them here
# makes them durable across any future backend swap.
#
# SMTP transport is already configured via GF_SMTP_* env from the
# grafana-smtp ExternalSecret (kv/ses/smtp); this only defines the recipient.
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaContactPoint
metadata:
  name: email-chris
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: local
  name: email-chris
  type: email
  settings:
    addresses: chris@chrisscotmartin.com
    singleEmail: true
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaNotificationPolicy
metadata:
  name: local-default
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: local
  route:
    receiver: email-chris
    group_by:
      - grafana_folder
      - alertname
