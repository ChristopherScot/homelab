# Pulls the ntfy Grafana access token (Bearer) from Vault into a Secret that
# the ntfy webhook contact points reference via valuesFrom. ntfy enforces
# token auth (auth-default-access: deny-all), so the contact points need it.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-ntfy
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-monitoring
    kind: SecretStore
  target:
    name: grafana-ntfy
    template:
      type: Opaque
      data:
        token: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef: { key: ntfy/config, property: grafana_token }
