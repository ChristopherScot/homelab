---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: local
  datasource:
    name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://victoria-metrics.monitoring.svc.cluster.local:8428
    isDefault: true
    editable: false
    jsonData:
      prometheusType: "Prometheus"
      prometheusVersion: "2.40.0"
      timeInterval: "30s"
      queryTimeout: "60s"
      httpMethod: "POST"
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-local
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: local
  datasource:
    name: Loki
    type: loki
    access: proxy
    url: http://loki.monitoring.svc.cluster.local:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 5000
      timeout: 60
