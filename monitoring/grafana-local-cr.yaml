# Local Grafana — `dashboards: local` is the selector that
# GrafanaDashboard/GrafanaDatasource CRs match against.
#
# Auth: Authelia at the ingress sets Remote-User; Grafana's auth.proxy
# auto-creates that user as Admin. Internal admin from Vault remains
# for operator API access and break-glass.
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: local
  namespace: monitoring
  labels:
    dashboards: local
spec:
  config:
    log:
      mode: "console"
      level: "warn"
    # Postgres backend (CNPG cluster grafana-db) instead of SQLite. SQLite
    # on Longhorn wedged on 2026-05-19 when a network blip stalled a write
    # and corrupted the journal. Postgres survives storage/network blips
    # (retried connections, WAL recovery, CNPG failover) and makes the
    # Grafana pod stateless. Host grafana-db-rw always points at the
    # current primary. User/name from the CNPG-generated grafana-db-app
    # secret; password injected as GF_DATABASE_PASSWORD env below.
    database:
      type: "postgres"
      host: "grafana-db-rw.monitoring.svc:5432"
      name: "grafana"
      user: "grafana"
      ssl_mode: "require"
    server:
      root_url: "https://grafana.home.chrisscotmartin.com"
      enforce_domain: "false"
    security:
      disable_initial_admin_creation: "false"
    users:
      auto_assign_org_role: "Admin"
      allow_sign_up: "false"
    auth:
      disable_login_form: "true"
      disable_signout_menu: "true"
    auth.basic:
      # Required for operator API access via the admin user.
      enabled: "true"
    auth.proxy:
      enabled: "true"
      header_name: "Remote-User"
      header_property: "username"
      auto_sign_up: "true"
      headers: "Email:Remote-Email Name:Remote-Name Groups:Remote-Groups"
    auth.anonymous:
      enabled: "false"
  deployment:
    spec:
      template:
        spec:
          # Grafana is now stateless — state lives in the grafana-db
          # Postgres cluster, not on a PVC. No volume override needed; the
          # operator's default emptyDir for /var/lib/grafana is fine.
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-local-admin
                      key: GF_SECURITY_ADMIN_USER
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-local-admin
                      key: GF_SECURITY_ADMIN_PASSWORD
                # Postgres password from the CNPG-generated app secret.
                - name: GF_DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-db-app
                      key: password
              # SMTP via SES — sender + host + creds injected as GF_SMTP_*
              # env vars from the ExternalSecret-managed Secret. Grafana's
              # config maps these to the [smtp] section.
              envFrom:
                - secretRef:
                    name: grafana-smtp
              resources:
                requests:
                  cpu: 50m
                  memory: 256Mi
                limits:
                  memory: 512Mi
              # Safe now that Grafana is stateless (Postgres backend, no
              # PVC) — a restart can't fight an old pod for an RWO volume.
              # Matches upstream grafana helm chart defaults. /api/health
              # is shallow but a genuinely hung process still fails it;
              # generous threshold avoids flapping on transient blips.
              livenessProbe:
                httpGet:
                  path: /api/health
                  port: 3000
                initialDelaySeconds: 60
                timeoutSeconds: 30
                failureThreshold: 10
  service:
    spec:
      type: ClusterIP
      ports:
        - name: grafana
          port: 3000
          targetPort: 3000
          protocol: TCP
