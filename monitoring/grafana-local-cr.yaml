# Local Grafana — `dashboards: local` is the selector that
# GrafanaDashboard/GrafanaDatasource CRs match against.
#
# Auth: Authelia at the ingress sets Remote-User; Grafana's auth.proxy
# auto-creates that user as Admin. Internal admin from Vault remains
# for operator API access and break-glass.
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: local
  namespace: monitoring
  labels:
    dashboards: local
spec:
  config:
    log:
      mode: "console"
      level: "warn"
    server:
      root_url: "https://grafana.home.chrisscotmartin.com"
      enforce_domain: "false"
    security:
      disable_initial_admin_creation: "false"
    users:
      auto_assign_org_role: "Admin"
      allow_sign_up: "false"
    auth:
      disable_login_form: "true"
      disable_signout_menu: "true"
    auth.basic:
      # Required for operator API access via the admin user.
      enabled: "true"
    auth.proxy:
      enabled: "true"
      header_name: "Remote-User"
      header_property: "username"
      auto_sign_up: "true"
      headers: "Email:Remote-Email Name:Remote-Name Groups:Remote-Groups"
    auth.anonymous:
      enabled: "false"
  deployment:
    spec:
      template:
        spec:
          # Operator creates local-pvc from the persistentVolumeClaim block
          # below, but doesn't auto-bind it to the grafana-data volume mount.
          # Override the volume here so SQLite data (users, dashboards,
          # service accounts) survives pod restarts.
          # fsGroup chowns the mount to Grafana's runtime UID (472) — without
          # it, Longhorn mounts as root:root and Grafana can't write.
          securityContext:
            fsGroup: 472
          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: local-pvc
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-local-admin
                      key: GF_SECURITY_ADMIN_USER
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-local-admin
                      key: GF_SECURITY_ADMIN_PASSWORD
              # SMTP via SES — sender + host + creds injected as GF_SMTP_*
              # env vars from the ExternalSecret-managed Secret. Grafana's
              # config maps these to the [smtp] section.
              envFrom:
                - secretRef:
                    name: grafana-smtp
              resources:
                requests:
                  cpu: 50m
                  memory: 256Mi
                limits:
                  memory: 512Mi
              # Matches the upstream grafana helm chart defaults. The
              # operator only sets a readinessProbe by default, which
              # removes the pod from Service endpoints on failure but
              # never restarts it — so a wedged process (e.g. sqlite
              # stuck replaying a journal after a node flap) can sit
              # broken indefinitely. Liveness with a generous threshold
              # only trips on truly hung processes, not transient blips.
              livenessProbe:
                httpGet:
                  path: /api/health
                  port: 3000
                initialDelaySeconds: 60
                timeoutSeconds: 30
                failureThreshold: 10
  persistentVolumeClaim:
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: longhorn
      resources:
        requests:
          storage: 1Gi
  service:
    spec:
      type: ClusterIP
      ports:
        - name: grafana
          port: 3000
          targetPort: 3000
          protocol: TCP
