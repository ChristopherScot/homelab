# Local Grafana — `dashboards: local` is the selector that
# GrafanaDashboard/GrafanaDatasource CRs match against.
#
# Auth: Authelia at the ingress sets Remote-User; Grafana's auth.proxy
# auto-creates that user as Admin. Internal admin from Vault remains
# for operator API access and break-glass.
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: local
  namespace: monitoring
  labels:
    dashboards: local
spec:
  config:
    log:
      mode: "console"
      level: "warn"
    server:
      root_url: "https://grafana.home.chrisscotmartin.com"
      enforce_domain: "false"
    security:
      disable_initial_admin_creation: "false"
    users:
      auto_assign_org_role: "Admin"
      allow_sign_up: "false"
    auth:
      disable_login_form: "true"
      disable_signout_menu: "true"
    auth.basic:
      # Required for operator API access via the admin user.
      enabled: "true"
    auth.proxy:
      enabled: "true"
      header_name: "Remote-User"
      header_property: "username"
      auto_sign_up: "true"
      headers: "Email:Remote-Email Name:Remote-Name Groups:Remote-Groups"
    auth.anonymous:
      enabled: "false"
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-local-admin
                      key: GF_SECURITY_ADMIN_USER
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-local-admin
                      key: GF_SECURITY_ADMIN_PASSWORD
              resources:
                requests:
                  cpu: 50m
                  memory: 256Mi
                limits:
                  memory: 512Mi
  persistentVolumeClaim:
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: longhorn
      resources:
        requests:
          storage: 1Gi
  service:
    spec:
      type: ClusterIP
      ports:
        - name: grafana
          port: 3000
          targetPort: 3000
          protocol: TCP
