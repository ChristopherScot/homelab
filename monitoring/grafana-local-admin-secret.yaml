# Vault prerequisite: vault kv put kv/grafana-local admin_user=... admin_password=...
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-local-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-monitoring
    kind: SecretStore
  target:
    name: grafana-local-admin
    template:
      type: Opaque
      data:
        GF_SECURITY_ADMIN_USER:     "{{ .admin_user }}"
        GF_SECURITY_ADMIN_PASSWORD: "{{ .admin_password }}"
  data:
    - secretKey: admin_user
      remoteRef:
        key: grafana-local
        property: admin_user
    - secretKey: admin_password
      remoteRef:
        key: grafana-local
        property: admin_password
