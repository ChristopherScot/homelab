# Admin credentials for the local Grafana instance.
#
# Vault setup (one-time, before this syncs):
#   vault kv put kv/grafana-local admin_user=admin admin_password=<secure-pw>
#
# Even with Authelia gating the UI, Grafana still needs an internal admin
# user for API access — the operator uses these creds when reconciling
# datasources and dashboards.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-local-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-monitoring
    kind: SecretStore
  target:
    name: grafana-local-admin
    template:
      type: Opaque
      data:
        # Field names match what the Grafana CR's deployment spec
        # mounts as GF_SECURITY_ADMIN_USER / GF_SECURITY_ADMIN_PASSWORD.
        GF_SECURITY_ADMIN_USER:     "{{ .admin_user }}"
        GF_SECURITY_ADMIN_PASSWORD: "{{ .admin_password }}"
  data:
    - secretKey: admin_user
      remoteRef:
        key: grafana-local
        property: admin_user
    - secretKey: admin_password
      remoteRef:
        key: grafana-local
        property: admin_password
