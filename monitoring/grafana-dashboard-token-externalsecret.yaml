# Grafana Cloud service-account token used by the dashboard-sync CronJob to
# upsert dashboards via /api/dashboards/db. Distinct from grafana-cloud-metrics
# (which holds the metrics-publisher token used by Alloy + mam-exporter for
# remote_write — different scope, can't talk to the dashboard API).
#
# Token is a Grafana SA token (glsa_*) created at
# chrisscotmartin.grafana.net/admin/access-control/serviceaccounts → "homelab"
# SA. If it gets rotated, regenerate there and update kv/grafana-cloud
# field=dashboard_token in Vault.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-cloud-dashboard-token
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-monitoring
    kind: SecretStore
  target:
    name: grafana-cloud-dashboard-token
    template:
      type: Opaque
      data:
        url:   "https://chrisscotmartin.grafana.net"
        token: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: grafana-cloud
        property: dashboard_token
