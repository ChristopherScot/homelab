# Codifies the existing 'monitoring' alerting folder as a CR so the alert-rule
# groups below have a managed parent. Title matches the pre-existing UI folder
# to avoid moving rules / churning their permalinks.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaFolder
metadata:
  name: monitoring
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: local
  # Pin to the pre-existing folder UID so the operator adopts it in place
  # rather than minting a new folder (which orphaned the rule groups).
  uid: afml6cskiwdtsc
  title: monitoring
