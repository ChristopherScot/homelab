# Pulls SES SMTP transport creds into a Secret consumed by Grafana for
# alert emails. Same kv/ses/smtp path used by Authelia and autocaliweb —
# sender is hardcoded per-app (Grafana <grafana@chrisscotmartin.com>) per
# the SES sender convention (see project_ses_sender_convention).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-smtp
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-monitoring
    kind: SecretStore
  target:
    name: grafana-smtp
    template:
      type: Opaque
      data:
        GF_SMTP_ENABLED: "true"
        GF_SMTP_HOST: "{{ .host }}:{{ .port }}"
        GF_SMTP_USER: "{{ .username }}"
        GF_SMTP_PASSWORD: "{{ .password }}"
        GF_SMTP_FROM_ADDRESS: "grafana@chrisscotmartin.com"
        GF_SMTP_FROM_NAME: "Grafana"
        GF_SMTP_STARTTLS_POLICY: "MandatoryStartTLS"
  data:
    - secretKey: host
      remoteRef: { key: ses/smtp, property: host }
    - secretKey: port
      remoteRef: { key: ses/smtp, property: port }
    - secretKey: username
      remoteRef: { key: ses/smtp, property: username }
    - secretKey: password
      remoteRef: { key: ses/smtp, property: password }
