# Idempotent post-deploy config for qBittorrent. Re-run any time to reconcile.
# Logs into the WebUI with creds from the qbittorrent-admin Secret, then PUTs
# preferences via /api/v2/app/setPreferences.
#
# Run manually:
#   kubectl create job -n media --from=cronjob/qbittorrent-configure qbittorrent-configure-manual-$(date +%s)
# (or just delete + re-apply — ArgoCD will recreate the CronJob; manually
# trigger via the UI / kubectl create job from it.)
#
# This is a CronJob with `suspend: true` so ArgoCD owns it but it never runs
# automatically. We only run it on demand.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: qbittorrent-configure
  namespace: media
spec:
  schedule: "0 0 1 1 *"   # never (1st of January at midnight); we trigger manually
  suspend: true
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          enableServiceLinks: false
          containers:
            - name: configure
              image: alpine:3.20
              env:
                - name: QBT_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: qbittorrent-admin
                      key: username
                - name: QBT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: qbittorrent-admin
                      key: password
              command:
                - sh
                - -c
                - |
                  set -e
                  apk add --no-cache curl jq >/dev/null

                  QBT=http://qbittorrent.media.svc.cluster.local:8080

                  echo "==> waiting for qbittorrent to be reachable"
                  # /api/v2/app/version requires auth (403); use / which serves
                  # the WebUI HTML unauthenticated (200).
                  until curl -sf "$QBT/" -o /dev/null; do sleep 2; done
                  echo "==> qbit reachable"

                  echo "==> logging in"
                  COOKIE=$(curl -sfi "$QBT/api/v2/auth/login" \
                    --data-urlencode "username=$QBT_USERNAME" \
                    --data-urlencode "password=$QBT_PASSWORD" \
                    -H "Referer: $QBT" \
                    | awk '/^[Ss]et-[Cc]ookie:/{sub(/^[Ss]et-[Cc]ookie: /,""); split($0,a,";"); print a[1]}')

                  if [ -z "$COOKIE" ]; then
                    echo "ERROR: login failed (no cookie). Check creds in Vault." >&2
                    exit 1
                  fi
                  echo "==> logged in"

                  PREFS=$(cat <<'JSON'
                  {
                    "save_path": "/media/downloads/complete",
                    "temp_path_enabled": true,
                    "temp_path": "/media/downloads/incomplete",
                    "preallocate_all": false,
                    "incomplete_files_ext": true,
                    "auto_delete_mode": 0,
                    "queueing_enabled": true,
                    "max_active_downloads": 5,
                    "max_active_uploads": 5,
                    "max_active_torrents": 10,
                    "dont_count_slow_torrents": true,
                    "max_ratio_enabled": true,
                    "max_ratio": 2.0,
                    "max_ratio_act": 0,
                    "listen_port": 51413,
                    "upnp": false,
                    "random_port": false,
                    "encryption": 1,
                    "anonymous_mode": false,
                    "dht": true,
                    "pex": true,
                    "lsd": false,
                    "add_trackers_enabled": false,
                    "bypass_local_auth": false,
                    "bypass_auth_subnet_whitelist_enabled": false,
                    "alternative_webui_enabled": false,
                    "use_https": false,
                    "web_ui_csrf_protection_enabled": true,
                    "web_ui_clickjacking_protection_enabled": true,
                    "web_ui_secure_cookie_enabled": true,
                    "web_ui_host_header_validation_enabled": false,
                    "web_ui_session_timeout": 2592000
                  }
                  JSON
                  )

                  echo "==> applying preferences"
                  curl -sf "$QBT/api/v2/app/setPreferences" \
                    -H "Cookie: $COOKIE" \
                    --data-urlencode "json=$PREFS"

                  echo "==> done"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
