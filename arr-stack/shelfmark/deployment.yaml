apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelfmark
  namespace: media
  annotations:
    # Restart on shelfmark-settings Secret changes so GitOps edits to
    # qbit/prowlarr config land without manual rollout.
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: shelfmark
  template:
    metadata:
      labels:
        app: shelfmark
    spec:
      enableServiceLinks: false
      initContainers:
        # Merge GitOps-managed settings (qbit + prowlarr config) into the
        # app's settings.json on every pod start. UI-managed cosmetic keys
        # (theme, language, etc.) are preserved by the deep merge — only
        # the keys we explicitly manage are overwritten.
        # alpine + apk (~5MB pulled once, cached). The jqlang/jq image is
        # FROM scratch and has no shell — we need sh for the conditional
        # default-empty + atomic replace.
        - name: merge-settings
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -eu
              apk add --no-cache jq >/dev/null
              CFG=/config/settings.json
              IN=/managed/settings.json
              [ -f "$CFG" ] || echo '{}' > "$CFG"
              jq -s '.[0] * .[1]' "$CFG" "$IN" > "$CFG.new"
              mv "$CFG.new" "$CFG"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: managed-settings
              mountPath: /managed
              readOnly: true
      containers:
        - name: shelfmark
          image: ghcr.io/calibrain/shelfmark:latest
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: America/New_York
            - name: FLASK_PORT
              value: "8084"
            # Lands directly in the autocaliweb watch folder so imports
            # are automatic — no manual copy step.
            - name: INGEST_DIR
              value: /books
          ports:
            - containerPort: 8084
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: ingest
              mountPath: /books
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: shelfmark-config-longhorn
        - name: ingest
          persistentVolumeClaim:
            claimName: acw-ingest-longhorn
        - name: managed-settings
          secret:
            secretName: shelfmark-settings
---
apiVersion: v1
kind: Service
metadata:
  name: shelfmark
  namespace: media
spec:
  selector:
    app: shelfmark
  ports:
    - name: http
      port: 8084
      targetPort: 8084
