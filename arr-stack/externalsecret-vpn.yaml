apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nordvpn-credentials
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-media
    kind: SecretStore
  target:
    name: nordvpn-credentials
  data:
    # OpenVPN creds — kept around in case we need to fall back, but
    # gluetun is currently using WireGuard (NordLynx) below.
    - secretKey: OPENVPN_USER
      remoteRef:
        key: nordvpn/openvpn
        property: username
    - secretKey: OPENVPN_PASSWORD
      remoteRef:
        key: nordvpn/openvpn
        property: password
    # NordLynx (WireGuard) private key. Used because NordVPN's OpenVPN
    # auth backend has been silently rejecting valid credentials since
    # ~Feb 2026 (gluetun issue #3132). WireGuard auth is a separate
    # code path on Nord's side and works.
    - secretKey: WIREGUARD_PRIVATE_KEY
      remoteRef:
        key: nordvpn/wireguard
        property: private_key
