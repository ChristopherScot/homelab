apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nordvpn-credentials
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-media
    kind: SecretStore
  target:
    name: nordvpn-credentials
  data:
    - secretKey: OPENVPN_USER
      remoteRef:
        key: nordvpn/openvpn
        property: username
    - secretKey: OPENVPN_PASSWORD
      remoteRef:
        key: nordvpn/openvpn
        property: password
