# Bazarr config: connect to Sonarr + Radarr.
# Bazarr's API uses cookie-session auth, so we POST credentials to /api/system/login
# first then PUT settings. The 'API key' field in arr-api-keys is just for the
# Sonarr/Radarr -> Bazarr direction (used by their settings if you wanted to
# call back).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bazarr-configure
  namespace: media
spec:
  schedule: "0 0 1 1 *"
  suspend: true
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: Never
          enableServiceLinks: false
          containers:
            - name: configure
              image: alpine:3.20
              env:
                - name: BAZARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: arr-api-keys
                      key: bazarr
                - name: SONARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: arr-api-keys
                      key: sonarr
                - name: RADARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: arr-api-keys
                      key: radarr
              command:
                - sh
                - -c
                - |
                  set -e
                  apk add --no-cache curl jq >/dev/null
                  BAZARR=http://bazarr.media.svc.cluster.local:6767
                  H="-H X-API-KEY:$BAZARR_API_KEY -H Content-Type:application/json"

                  echo "==> waiting for bazarr"
                  until curl -sf $H "$BAZARR/api/system/status" >/dev/null; do sleep 2; done

                  # Bazarr's settings API takes the entire settings doc and merges.
                  # We send only what we want to change.
                  PAYLOAD=$(jq -n \
                    --arg sonarr_key "$SONARR_API_KEY" \
                    --arg radarr_key "$RADARR_API_KEY" \
                    '{
                      sonarr: {
                        ip: "sonarr.media.svc.cluster.local",
                        port: 8989,
                        base_url: "/",
                        ssl: false,
                        apikey: $sonarr_key,
                        full_update: "Daily",
                        only_monitored: false,
                        series_sync: 60
                      },
                      radarr: {
                        ip: "radarr.media.svc.cluster.local",
                        port: 7878,
                        base_url: "/",
                        ssl: false,
                        apikey: $radarr_key,
                        full_update: "Daily",
                        only_monitored: false,
                        movies_sync: 60
                      },
                      general: {
                        use_sonarr: true,
                        use_radarr: true,
                        path_mappings: [],
                        path_mappings_movie: []
                      }
                    }')

                  echo "==> applying settings"
                  curl -sf $H "$BAZARR/api/system/settings" -X POST -d "$PAYLOAD"

                  # Enable English as a wanted subtitle language. Idempotent:
                  # we POST the full languages list with `en` flipped to
                  # enabled=true, leaving everything else as-is.
                  echo "==> enabling English language"
                  curl -sf $H "$BAZARR/api/system/languages" \
                    | jq 'map(if .code2=="en" then .enabled=true else . end)
                          | map({code2, enabled})' \
                    | curl -sf $H "$BAZARR/api/system/languages" -X POST -d @-

                  # Create the "English" language profile (the thing series
                  # and movies get tagged with). Skip if a profile by that
                  # name already exists — Bazarr has no PUT-by-name, only
                  # POST-create / PATCH-by-id, so name-based dedup is the
                  # idempotent path.
                  if curl -sf $H "$BAZARR/api/system/languages/profiles" \
                       | jq -e '.[] | select(.name=="English")' >/dev/null; then
                    echo "==> language profile 'English' already exists"
                  else
                    echo "==> creating English language profile"
                    curl -sf $H "$BAZARR/api/system/languages/profiles" -X POST -d '{
                      "name": "English",
                      "cutoff": null,
                      "items": [{"language":"en","forced":"False","hi":"False","audio_exclude":"False"}],
                      "mustContain": [],
                      "mustNotContain": [],
                      "originalFormat": false
                    }'
                  fi

                  # Set the English profile as default for new series + movies
                  # and turn on subtitle upgrades (re-checks weekly for 7 days
                  # to grab a better sub when one appears). Profile id=1 is
                  # safe because this is the first profile we ever create.
                  echo "==> setting default profile + auto-download"
                  curl -sf $H "$BAZARR/api/system/settings" -X POST -d '{
                    "general": {
                      "serie_default_enabled": true,
                      "serie_default_profile": 1,
                      "movie_default_enabled": true,
                      "movie_default_profile": 1,
                      "upgrade_subs": true,
                      "upgrade_frequency": 12,
                      "days_to_upgrade_subs": 7
                    }
                  }'

                  echo "==> done"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
