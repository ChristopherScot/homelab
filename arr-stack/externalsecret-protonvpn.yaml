apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: protonvpn-credentials
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-gluetun-vpn
    kind: SecretStore
  target:
    name: protonvpn-credentials
    template:
      type: Opaque
      data:
        # WG private key for ProtonVPN — gluetun reads from env.
        WIREGUARD_PRIVATE_KEY: "{{ .wg_key }}"
        # Gluetun's HTTP API key for the qBit sync-port docker-mod to
        # call /v1/portforward. Embedded in /gluetun/auth/config.toml
        # via the gluetun-auth-config ConfigMap (templated at startup).
        GLUETUN_API_KEY: "{{ .api_key }}"
  data:
    - secretKey: wg_key
      remoteRef:
        key: protonvpn/gluetun
        property: wireguard_private_key
    - secretKey: api_key
      remoteRef:
        key: gluetun/api_key
        property: value
