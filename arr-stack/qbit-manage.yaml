# qbit_manage: applies per-category share limits to qBittorrent.
#
# Why: MAM (and other private trackers) require seed-forever / no-time-limit
# behavior, while public-tracker grabs (movies/TV) should stop at ratio 2.0
# or 72h to free resources. qBit's globals can't express both, so qbit_manage
# applies different limits per category.
#
# Globals are now permissive (max_ratio_enabled=false in qbittorrent-prefs):
# every torrent seeds forever by default. qbit_manage then OVERRIDES to:
#   - books-readarr / books-mam-seedonly → seed forever (-1/-1/-1)
#   - movies-radarr / tv-sonarr          → stop at ratio 2.0 or 72h
#
# Why this split: previously globals stopped everything at 2.0 and qbit_manage
# overrode books to seed forever. After disabling the global ratio cap (to
# protect MAM H&R seeding clocks from premature stops), movies/TV need an
# explicit cap here instead.
#
# Runs every 30 minutes. The check is idempotent — re-applying limits to
# torrents that already have them is a no-op.
apiVersion: v1
kind: ConfigMap
metadata:
  name: qbit-manage-config
  namespace: media
data:
  config.yml: |
    commands:
      dry_run: false
      recheck: false
      cat_update: false
      tag_update: false
      rem_unregistered: false
      tag_tracker_error: false
      rem_orphaned: false
      tag_nohardlinks: false
      share_limits: true
      skip_qb_version_check: false
      skip_cleanup: false

    qbt:
      host: "qbittorrent.media.svc.cluster.local:8080"
      user: !ENV QBT_USER
      pass: !ENV QBT_PASS

    settings:
      # Tells qbit_manage to override qBit's global share-limit defaults
      # rather than respecting them. Required for our per-category rules
      # to actually take effect on torrents that inherited globals.
      disable_qbt_default_share_limits: true

    # Share-limit groups. Each named group matches torrents by category
    # (or tag/tracker) and applies the listed limits. -1 = unlimited.
    # Lower priority number wins when a torrent matches multiple groups.
    share_limits:
      private-trackers-seed-forever:
        priority: 1
        categories:
          - books-readarr
          - books-mam-seedonly
        max_ratio: -1
        max_seeding_time: -1
        max_last_active: -1
        cleanup: false
        resume_torrent_after_change: true

      # Public-tracker grabs from radarr/sonarr — stop seeding once we've
      # given back 2x what we took, OR after 72h, whichever comes first.
      # cleanup:false leaves the torrent (paused) in qBit so the *arr apps
      # don't lose track of it; manual cleanup or qbit retention handles
      # actual deletion later.
      public-trackers-stop-at-ratio-or-time:
        priority: 2
        categories:
          - movies-radarr
          - tv-sonarr
        max_ratio: 2.0
        max_seeding_time: 4320     # minutes (72h)
        max_last_active: -1
        cleanup: false
        resume_torrent_after_change: false

    # qbit_manage validation requires `directory.root_dir` and at least
    # one entry under `cat` even when we're not using cat_update / orphaned.
    # Both point at where qBit actually stores files (set by
    # qbittorrent-configure: save_path=/media/downloads/complete).
    directory:
      root_dir: /media/downloads/complete
    cat:
      books-readarr: /media/downloads/complete
      books-mam-seedonly: /media/downloads/seedonly
      movies-radarr: /media/downloads/complete
      tv-sonarr: /media/downloads/complete
    # `tracker` and `nohardlinks` are required sections. We're not using
    # tag-by-tracker or hardlink detection, but the schema needs entries.
    # MAM placeholder is harmless — only matches torrents with that
    # tracker URL, of which we have none yet.
    tracker:
      myanonamouse.net:
        tag: mam
    nohardlinks:
      books-readarr:
    recyclebin:
      enabled: false
    orphaned:
      empty_after_x_days: 0
    apprise:
    notifiarr:
    webhooks:
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: qbit-manage
  namespace: media
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          enableServiceLinks: false
          # /config must be writable (entrypoint copies sample files in,
          # chowns, etc.). ConfigMap mounts are read-only, so we copy the
          # rendered config.yml from the ConfigMap into an emptyDir at
          # init time and the main container mounts that.
          initContainers:
            - name: seed-config
              image: busybox:1.37
              command: [sh, -c, "cp /cm/config.yml /config/config.yml"]
              volumeMounts:
                - name: configmap
                  mountPath: /cm
                - name: config
                  mountPath: /config
          containers:
            - name: qbit-manage
              image: bobokun/qbit_manage:v4.7.0
              # Pass args through the entrypoint. --run = one-shot mode
              # (exit after a single reconcile, don't loop).
              args:
                - python3
                - qbit_manage.py
                - --run
                - --config-file
                - /config/config.yml
              env:
                - name: QBT_USER
                  valueFrom:
                    secretKeyRef:
                      name: qbittorrent-admin
                      key: username
                - name: QBT_PASS
                  valueFrom:
                    secretKeyRef:
                      name: qbittorrent-admin
                      key: password
              volumeMounts:
                - name: config
                  mountPath: /config
              resources:
                requests:
                  cpu: 20m
                  memory: 64Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: configmap
              configMap:
                name: qbit-manage-config
            - name: config
              emptyDir: {}
