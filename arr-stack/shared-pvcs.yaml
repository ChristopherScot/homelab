---
# Pilot migration off NFS to Longhorn block storage. Bazarr's SQLite config
# (~1MB, single-writer, lots of small reads) is the test workload; NFS adds
# 5-50ms per syscall and that hurts SQLite specifically. Longhorn keeps
# 3 replicas across nodes for redundancy.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bazarr-config-longhorn
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
