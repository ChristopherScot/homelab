# Jellyfin's transcoding cache — local-fast, ephemeral. Using Longhorn so it
# can move across nodes if Jellyfin re-schedules, but realistically it's
# pinned to pop-os for HW transcode and emptyDir would suffice. Keeping a
# proper PVC so cache survives pod restarts.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-cache
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
