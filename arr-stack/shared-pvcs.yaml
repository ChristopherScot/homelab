# Shared media volume — RWX NFS share on the NAS at /volume1/media-stack-...
# Mounted as /media in qBittorrent, every *arr, and Jellyfin. Single mount =
# hardlinks work (qBit can hardlink the downloaded file into /media/movies/
# without doubling disk usage on the NAS).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-data
  namespace: media
spec:
  accessModes: [ReadWriteMany]
  storageClassName: synology-nfs
  resources:
    requests:
      storage: 100Gi   # NFS share size on Synology is dynamic; this is a
                       # k8s-tracked quota. Bump as the library grows.
---
# Per-app config volumes — RWO iSCSI, btrfs, snapshot-friendly.
