apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prowlarr-public
  namespace: media
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    gethomepage.dev/enabled: "true"
    gethomepage.dev/widget.type: "prowlarr"
    gethomepage.dev/widget.url: "http://prowlarr-public.media.svc.cluster.local:9696"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_PROWLARR_PUBLIC_KEY}}"
    gethomepage.dev/pod-selector: "app=prowlarr-public"
    gethomepage.dev/name: "Prowlarr (public)"
    gethomepage.dev/description: "Indexer manager (public trackers, direct WAN)"
    gethomepage.dev/group: "Media"
    gethomepage.dev/icon: "prowlarr.png"
    nginx.ingress.kubernetes.io/auth-url: "http://authelia.authelia.svc.cluster.local/api/verify"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.home.chrisscotmartin.com/?rd=$scheme://$host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header X-Forwarded-Method $request_method;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Forwarded-For $remote_addr;
    nginx.ingress.kubernetes.io/auth-response-headers: "Remote-User,Remote-Name,Remote-Email,Remote-Groups"
spec:
  ingressClassName: external
  tls:
    - hosts: [prowlarr-public.home.chrisscotmartin.com]
      secretName: prowlarr-public-tls
  rules:
    - host: prowlarr-public.home.chrisscotmartin.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prowlarr-public
                port:
                  number: 9696
