apiVersion: apps/v1
kind: Deployment
metadata:
  name: readarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: readarr
  template:
    metadata:
      labels:
        app: readarr
    spec:
      enableServiceLinks: false
      # Colocate with autocaliweb so we share the same node as the
      # books-longhorn-rwo volume Longhorn attaches there.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: autocaliweb
              topologyKey: kubernetes.io/hostname
      containers:
        - name: readarr
          # No 'latest'/stable tag exists — upstream stable branch has been
          # frozen for years. Develop branch is the de-facto stable.
          image: lscr.io/linuxserver/readarr:0.4.18-develop
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 8787
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
            # Books library lives on its own Longhorn RWX PVC for
            # SQLite performance — overlay-mounted at /media/books so
            # Readarr's existing rootfolder config keeps working unchanged.
            - name: books
              mountPath: /media/books
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: readarr-config-longhorn
        - name: media
          persistentVolumeClaim:
            claimName: media-data
        - name: books
          persistentVolumeClaim:
            claimName: books-longhorn-rwo
---
apiVersion: v1
kind: Service
metadata:
  name: readarr
  namespace: media
spec:
  selector:
    app: readarr
  ports:
    - name: http
      port: 8787
      targetPort: 8787
