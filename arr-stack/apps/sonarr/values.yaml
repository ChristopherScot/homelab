name: sonarr
image: lscr.io/linuxserver/sonarr:4.0.17
port: 8989

config:
  size: 5Gi

extraVolumes:
  - name: media
    mountPath: /media
    claimName: media-data

ingress:
  host: sonarr.home.chrisscotmartin.com
  authelia: two_factor
  homepage:
    enabled: true
    widgetType: sonarr
    widgetKeyVar: SONARR_KEY
    displayName: Sonarr
    description: TV library manager
    icon: sonarr.png

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi
