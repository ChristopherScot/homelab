# Recyclarr syncs quality profiles + custom formats from TRaSH guides into
# Sonarr/Radarr. CronJob runs daily; it's a one-shot tool, not a daemon.
#
# Sonarr/Radarr API keys live in their own config volumes (each generates one
# on first launch). Recyclarr reads them via a Secret called `arr-api-keys`
# which you populate manually after first launch:
#
#   API_KEY=$(kubectl exec -n media deploy/sonarr -- \
#     grep ApiKey /config/config.xml | sed 's/.*<ApiKey>\(.*\)<\/ApiKey>.*/\1/')
#   kubectl -n media create secret generic arr-api-keys \
#     --from-literal=sonarr=$API_KEY \
#     --from-literal=radarr=$RADARR_KEY
#
# Until that secret exists, the CronJob will CrashLoop. That's fine — we'll
# create it after Sonarr/Radarr finish first-run config.

apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
data:
  recyclarr.yml: |
    # TRaSH guides — HD Bluray + WEB (1080p). Most-recommended homelab default.
    #
    # v8 syntax: profiles are guide-backed via `trash_id` directly on the
    # quality_profiles entry (no more `include: [template: ...]`). Custom
    # formats list their own trash_ids and use `assign_scores_to` (formerly
    # `quality_profiles`).
    sonarr:
      home-tv:
        base_url: http://sonarr.media.svc.cluster.local:8989
        api_key: !env_var SONARR_API_KEY
        delete_old_custom_formats: true

        quality_definition:
          type: series

        quality_profiles:
          - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p
            reset_unmatched_scores:
              enabled: true

        # Prefer dual-language releases for foreign shows like Kleo so the
        # original stays available when the dub is bad. MULTi matches
        # release titles tagged \bMulti\b (German DL, etc.) — these bundle
        # original + English. Originals still get grabbed as fallback.
        custom_formats:
          - trash_ids:
              - 7ba05c6e0e14e793538174c679126996  # MULTi
            assign_scores_to:
              - name: WEB-1080p
                score: 500

    radarr:
      home-movies:
        base_url: http://radarr.media.svc.cluster.local:7878
        api_key: !env_var RADARR_API_KEY
        delete_old_custom_formats: true

        quality_definition:
          type: movie

        quality_profiles:
          - trash_id: d1d67249d3890e49bc12e275d989a7e9  # HD Bluray + WEB
            reset_unmatched_scores:
              enabled: true

        # Prefer dual-language releases (original + English dub) so foreign
        # films land with both tracks — Jellyfin's audio-language pref picks
        # English by default, but the original is one click away if the dub
        # is bad. "Dubs Only" gets a *negative* score: those releases strip
        # the original entirely, which we don't want. Original-only releases
        # still get grabbed when neither dual nor dub exists.
        custom_formats:
          - trash_ids:
              - 4b900e171accbfb172729b63323ea8ca  # MULTi
            assign_scores_to:
              - name: HD Bluray + WEB
                score: 500
          - trash_ids:
              - b23eae459cc960816f2d6ba84af45055  # Dubs Only
            assign_scores_to:
              - name: HD Bluray + WEB
                score: -200
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
  namespace: media
spec:
  schedule: "0 4 * * *"   # 4am daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          enableServiceLinks: false
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:8.6.0
              args: ["sync"]
              env:
                - name: SONARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: arr-api-keys
                      key: sonarr
                - name: RADARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: arr-api-keys
                      key: radarr
              volumeMounts:
                - name: config
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: config
              configMap:
                name: recyclarr-config
