# Recyclarr syncs quality profiles + custom formats from TRaSH guides into
# Sonarr/Radarr. CronJob runs daily; it's a one-shot tool, not a daemon.
#
# Sonarr/Radarr API keys live in their own config volumes (each generates one
# on first launch). Recyclarr reads them via a Secret called `arr-api-keys`
# which you populate manually after first launch:
#
#   API_KEY=$(kubectl exec -n media deploy/sonarr -- \
#     grep ApiKey /config/config.xml | sed 's/.*<ApiKey>\(.*\)<\/ApiKey>.*/\1/')
#   kubectl -n media create secret generic arr-api-keys \
#     --from-literal=sonarr=$API_KEY \
#     --from-literal=radarr=$RADARR_KEY
#
# Until that secret exists, the CronJob will CrashLoop. That's fine — we'll
# create it after Sonarr/Radarr finish first-run config.

apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
data:
  recyclarr.yml: |
    # TRaSH guides — HD Bluray + WEB (1080p). Most-recommended homelab default.
    sonarr:
      home-tv:
        base_url: http://sonarr.media.svc.cluster.local:8989
        api_key: !env_var SONARR_API_KEY
        delete_old_custom_formats: true
        replace_existing_custom_formats: true

        include:
          - template: sonarr-quality-definition-series
          - template: sonarr-v4-quality-profile-web-1080p
          - template: sonarr-v4-custom-formats-web-1080p

        # Optional: keep your own tweaks here. Leaving empty for now.
        custom_formats: []

    radarr:
      home-movies:
        base_url: http://radarr.media.svc.cluster.local:7878
        api_key: !env_var RADARR_API_KEY
        delete_old_custom_formats: true
        replace_existing_custom_formats: true

        include:
          - template: radarr-quality-definition-movie
          - template: radarr-quality-profile-hd-bluray-web
          - template: radarr-custom-formats-hd-bluray-web

        custom_formats: []
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
  namespace: media
spec:
  schedule: "0 4 * * *"   # 4am daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          enableServiceLinks: false
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:7.4.1
              args: ["sync"]
              env:
                - name: SONARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: arr-api-keys
                      key: sonarr
                - name: RADARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: arr-api-keys
                      key: radarr
              volumeMounts:
                - name: config
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: config
              configMap:
                name: recyclarr-config
