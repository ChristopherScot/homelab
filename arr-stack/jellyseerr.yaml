apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyseerr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyseerr
  template:
    metadata:
      labels:
        app: jellyseerr
    spec:
      enableServiceLinks: false
      # Migrated from fallenbagel/jellyseerr:2.x to seerr-team/seerr (the
      # rebrand). Seerr runs as non-root user `node` (uid 1000); fsGroup
      # ensures the existing config PVC is writable on first start. The
      # /app/config mount path stays the same — Seerr reads the legacy
      # location and migrates settings in-place on boot.
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: jellyseerr
          image: ghcr.io/seerr-team/seerr:latest
          env:
            - name: TZ
              value: America/New_York
            - name: LOG_LEVEL
              value: info
          ports:
            - containerPort: 5055
              name: http
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyseerr-config-nfs
---
apiVersion: v1
kind: Service
metadata:
  name: jellyseerr
  namespace: media
spec:
  selector:
    app: jellyseerr
  ports:
    - name: http
      port: 5055
      targetPort: 5055
