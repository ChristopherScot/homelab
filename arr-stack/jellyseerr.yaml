apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyseerr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyseerr
  template:
    metadata:
      labels:
        app: jellyseerr
    spec:
      enableServiceLinks: false
      # Migrated from fallenbagel/jellyseerr:2.x to seerr-team/seerr (the
      # rebrand). Seerr runs as non-root user `node` (uid 1000), but the
      # existing config PVC was written by the old root-owned image.
      # Synology NFS root_squash maps client-side root to nobody, so a
      # `chown 1000:1000` from the cluster doesn't take effect. Instead,
      # `chmod -R 777` opens perms for everyone — the dir already lives
      # under our private NFS export (`mountPermissions: 0777` in the
      # StorageClass), so this isn't a security regression. New files
      # Seerr creates are owned by node:node and inherit ugo+rw.
      initContainers:
        - name: fix-config-perms
          image: alpine:3.20
          command: ["sh", "-c", "chmod -R 777 /app/config"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: config
              mountPath: /app/config
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: jellyseerr
          image: ghcr.io/seerr-team/seerr:latest
          env:
            - name: TZ
              value: America/New_York
            - name: LOG_LEVEL
              value: info
          ports:
            - containerPort: 5055
              name: http
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyseerr-config-nfs
---
apiVersion: v1
kind: Service
metadata:
  name: jellyseerr
  namespace: media
spec:
  selector:
    app: jellyseerr
  ports:
    - name: http
      port: 5055
      targetPort: 5055
