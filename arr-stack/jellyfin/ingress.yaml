# Jellyfin is special: real clients (Apple TV, Roku, etc.) can't follow the
# Authelia redirect chain. So jellyfin.home.chrisscotmartin.com gets TLS but
# NOT forward-auth — Jellyfin's own login handles that. Browser users still
# go through Authelia first by visiting via the Jellyseerr "watch now" link
# (which redirects through auth-protected paths) but direct API access works.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin
  namespace: media
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    gethomepage.dev/enabled: "true"
    gethomepage.dev/widget.type: "jellyfin"
    gethomepage.dev/widget.url: "http://jellyfin.media.svc.cluster.local:8096"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
    gethomepage.dev/widget.enableBlocks: "true"
    gethomepage.dev/widget.enableNowPlaying: "true"
    gethomepage.dev/pod-selector: "app=jellyfin"
    gethomepage.dev/name: "Jellyfin"
    gethomepage.dev/description: "Media server"
    gethomepage.dev/group: "Media"
    gethomepage.dev/icon: "jellyfin.png"
    # Jellyfin streams large files; raise nginx timeouts.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Inject the media-cleanup JS into Jellyfin's HTML so admins get a
    # "Cleanup" button on movie/series detail pages. Clearing Accept-Encoding
    # forces uncompressed responses so sub_filter can rewrite them.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Accept-Encoding "";
      sub_filter '</body>' '<script src="https://media-cleanup.home.chrisscotmartin.com/inject.js"></script></body>';
      sub_filter_once on;
      sub_filter_types text/html;
spec:
  ingressClassName: external
  tls:
    - hosts: [jellyfin.home.chrisscotmartin.com]
      secretName: jellyfin-tls
  rules:
    - host: jellyfin.home.chrisscotmartin.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin
                port:
                  number: 8096
