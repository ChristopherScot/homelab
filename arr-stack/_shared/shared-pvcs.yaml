# Shared media volume — RWX NFS share on the NAS. Mounted as /media in
# qBittorrent, every *arr, and Jellyfin. Single mount = hardlinks work
# (qBit can hardlink the downloaded file into /media/movies/ without
# doubling disk usage on the NAS).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-data
  namespace: media
spec:
  accessModes: [ReadWriteMany]
  storageClassName: synology-nfs
  resources:
    requests:
      storage: 2Ti
---
# qBittorrent config — kept on iSCSI because it's the only app with
# meaningful I/O (download piece state, fastresume files). SQLite-on-iSCSI
# is also unambiguously fine for single-writer.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-config
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: synology-iscsi
  resources:
    requests:
      storage: 5Gi
---
# Gluetun config — kept on iSCSI for the same reason as qbit (sibling in
# the same pod; pulling its config off iSCSI would mean the pod still has
# both NFS + iSCSI mounts, no real win).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gluetun-config
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: synology-iscsi
  resources:
    requests:
      storage: 1Gi
---
# *arr configs — moved to NFS. Names suffixed -nfs so the iSCSI versions
# (Retain) survive the cutover; we manually delete the LUNs in DSM after
# verifying the migration. Synology DSM has a hard cap on simultaneous
# iSCSI LUNs (~16-64 depending on model), and 8 small *arr LUNs eats most
# of the budget for nothing — the apps are single-writer SQLite and run
# fine on NFSv4.1 with proper byte-range locking.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prowlarr-config-nfs
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: synology-nfs
  resources:
    requests:
      storage: 2Gi
---
# Replaces prowlarr-config-nfs. Configs on Longhorn (sqlite + heavy
# Definitions cache); NFS reserved for bulk media only.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prowlarr-config-longhorn
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
# *arr config PVCs live on Longhorn (block, 3-replica, low-latency) rather
# than NFS — SQLite workloads suffer 5-50ms per syscall on NFS. The
# previously-NFS-backed PVCs were retired after migration; underlying
# NAS shares are still on the Synology (reclaim=Retain) until manually
# deleted in DSM.
#
# bazarr-config-longhorn moved into the arr-app Helm chart — it's created
# by the chart's PVC template per the values.yaml in arr-stack/apps/bazarr/.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyseerr-config-longhorn
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
# readarr-config-longhorn moved into the arr-app Helm chart.
# sonarr-config-longhorn moved into the arr-app Helm chart.
# radarr-config-longhorn moved into the arr-app Helm chart.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-longhorn
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
# autocaliweb's config PVC is RWO; supernote-shelf-sync co-locates via
# podAffinity to RO-mount it. Migrating to Longhorn keeps that working.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: autocaliweb-config-longhorn
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      # 5Gi filled up: processed_books/ keeps a backup copy of every
      # ingested book + originals + failed imports. 20Gi gives headroom.
      storage: 20Gi
---
# Calibre metadata PVC (referenced by autocaliweb's /calibre-metadata
# mount). Kept around even though calibre-web doesn't have a native
# split-library option — removing it would orphan that mount.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: autocaliweb-metadata-longhorn
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
# Kavita config + DB. RWO because Kavita uses SQLite internally and
# benefits from local-disk performance.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kavita-config-longhorn
  namespace: media
  annotations:
    # Prune=false during chart migration. Remove once kavita's chart-based
    # Application owns the resource.
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
# Ingest folder shared between Shelfmark (writes downloads here) and
# autocaliweb (watches and imports). RWX so both pods can mount it.
# Longhorn (block + share-manager) instead of synology-nfs because the
# Synology NFS class uses `actimeo=600` which caches directory entries
# for 10 minutes — autocaliweb's polling watcher sees ghost entries for
# deleted files and gets stuck in an ingest loop that starves the Flask
# web UI and triggers liveness probe failures → 503s on books.home.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: acw-ingest-longhorn
  namespace: media
spec:
  accessModes: [ReadWriteMany]
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi
---
# Calibre books library — RWO Longhorn. Was RWX (NFS-Ganesha
# share-manager) but every SQLite/file op from autocaliweb suffered
# 30–50 ms per pread, making the UI unusable. Now RWO; all consumers
# (autocaliweb, readarr, supernote-shelf-sync, webdav, kavita)
# colocate via podAffinity on whichever non-pop-os node Longhorn
# attaches this volume to.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: books-longhorn-rwo
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shelfmark-config-nfs
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: synology-nfs
  resources:
    requests:
      storage: 1Gi
---
# Replaces shelfmark-config-nfs. Configs go on Longhorn (matches *arr
# convention); only bulk media stays on NFS.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shelfmark-config-longhorn
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
# prowlarr-public-config-longhorn moved into the arr-app Helm chart.
