# Second Prowlarr instance dedicated to public indexers.
#
# Why two: Cloudflare blocks NordVPN datacenter-exit IPs (error 1006) on
# many public indexers (1337x, extratorrent, torrentio, etc), so queries
# from inside gluetun fail with 403 regardless of FlareSolverr. This pod
# runs OUTSIDE gluetun — indexer queries egress via the home WAN, which
# Cloudflare doesn't blanket-block. qBit downloads still go through the
# original gluetun pod, so torrent traffic remains VPN-protected.
#
# The original Prowlarr (in gluetun-qbit-prowlarr.yaml) keeps MAM and
# any other private/IP-locked indexers — those expect a stable VPN IP
# and would break if moved.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr-public
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prowlarr-public
  template:
    metadata:
      labels:
        app: prowlarr-public
    spec:
      containers:
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:2.3.5
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 9696
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-public-config-longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr-public
  namespace: media
spec:
  selector:
    app: prowlarr-public
  ports:
    - name: http
      port: 9696
      targetPort: 9696
