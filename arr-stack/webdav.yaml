apiVersion: v1
kind: ConfigMap
metadata:
  name: webdav-config
  namespace: media
data:
  # Single read-only user; the Supernote NetVirtualDisk app rejected the
  # no-auth setup ("couldn't connect" with no detail) — its WebDAV client
  # requires a 401-challenge round-trip with non-empty creds. Username and
  # password come from Vault via webdav-creds Secret, env-var substituted
  # at startup.
  config.yml: |
    address: 0.0.0.0
    port: 6065
    prefix: /
    behindProxy: true
    cors:
      enabled: true
      credentials: false
    log:
      format: json
    users:
      - username: "{env}WEBDAV_USERNAME"
        password: "{env}WEBDAV_PASSWORD"
        directory: /data
        permissions: R
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webdav
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webdav
  template:
    metadata:
      labels:
        app: webdav
    spec:
      containers:
        - name: webdav
          image: ghcr.io/hacdias/webdav:v5
          args: ["-c", "/etc/webdav/config.yml"]
          ports:
            - containerPort: 6065
              name: http
          envFrom:
            - secretRef:
                name: webdav-creds
          volumeMounts:
            - name: config
              mountPath: /etc/webdav
            - name: library
              mountPath: /data
              subPath: books
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: webdav-config
        - name: library
          persistentVolumeClaim:
            claimName: media-data
---
apiVersion: v1
kind: Service
metadata:
  name: webdav
  namespace: media
spec:
  selector:
    app: webdav
  ports:
    - name: http
      port: 6065
      targetPort: 6065
