apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      enableServiceLinks: false
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.image }}
          # Run as root because Synology NFS squashes all writes to 'admin'
          # on the server side; trying to be PUID 1000 inside the container
          # makes app writes fail when the directory is admin-owned on the
          # NAS. With PUID=0 the container also writes as root, both sides
          # end up as the squashed admin user, and writes succeed.
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: America/New_York
            {{- range .Values.env }}
            - {{ toYaml . | nindent 14 | trim }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.port }}
              name: http
          {{- with .Values.probes.liveness }}
          livenessProbe:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with .Values.probes.readiness }}
          readinessProbe:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with .Values.probes.startup }}
          startupProbe:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- if or .Values.config.enabled .Values.extraVolumes }}
          volumeMounts:
            {{- if .Values.config.enabled }}
            - name: config
              mountPath: {{ .Values.config.mountPath }}
            {{- end }}
            {{- range .Values.extraVolumes }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
              {{- if .readOnly }}
              readOnly: true
              {{- end }}
            {{- end }}
          {{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      {{- if or .Values.config.enabled .Values.extraVolumes }}
      volumes:
        {{- if .Values.config.enabled }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.name }}-config-longhorn
        {{- end }}
        {{- range .Values.extraVolumes }}
        - name: {{ .name }}
          {{- if .configMap }}
          configMap:
            name: {{ .configMap }}
            defaultMode: {{ .defaultMode | default 0755 }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ .claimName }}
          {{- end }}
        {{- end }}
      {{- end }}
