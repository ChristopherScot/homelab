apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      enableServiceLinks: false
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.image }}
          # Run as root because Synology NFS squashes all writes to 'admin'
          # on the server side; trying to be PUID 1000 inside the container
          # makes app writes fail when the directory is admin-owned on the
          # NAS. With PUID=0 the container also writes as root, both sides
          # end up as the squashed admin user, and writes succeed.
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: {{ .Values.port }}
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            {{- range .Values.extraVolumes }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.name }}-config-longhorn
        {{- range .Values.extraVolumes }}
        - name: {{ .name }}
          persistentVolumeClaim:
            claimName: {{ .claimName }}
        {{- end }}
