apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.name }}-config-longhorn
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.config.storageClass }}
  resources:
    requests:
      storage: {{ .Values.config.size }}
  {{- if .Values.config.restoreFromSnapshot }}
  # CSI VolumeSnapshot dataSource — Longhorn provisions a NEW volume
  # pre-populated from the named snapshot. Field is immutable on a bound
  # PVC, but consulted only at provisioning time. After restore completes
  # the underlying VolumeSnapshot CR can be deleted; this field becomes
  # a dead pointer with no functional effect, safe to leave in values.yaml.
  dataSource:
    apiGroup: snapshot.storage.k8s.io
    kind: VolumeSnapshot
    name: {{ .Values.config.restoreFromSnapshot }}
  {{- end }}
