{{- if .Values.config.restoreFromBackup -}}
# When restoreFromBackup is set, the PVC needs a dedicated StorageClass
# carrying the fromBackup parameter so Longhorn provisions a NEW volume
# pre-populated from the named backup. After restore completes (data is
# in the volume, not in fromBackup parameter), unset restoreFromBackup
# in values.yaml and the chart switches back to the plain `longhorn` SC.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.name }}-restore-sc
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "30"
  fromBackup: {{ .Values.config.restoreFromBackup | quote }}
  fsType: ext4
  dataLocality: disabled
---
{{- end }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.name }}-config-longhorn
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ if .Values.config.restoreFromBackup }}{{ .Values.name }}-restore-sc{{ else }}{{ .Values.config.storageClass }}{{ end }}
  resources:
    requests:
      storage: {{ .Values.config.size }}
