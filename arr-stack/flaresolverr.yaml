# FlareSolverr — proxies Prowlarr's requests through a headless browser to
# bypass Cloudflare's anti-bot challenges. Used by 1337x, EZTV and other
# CF-protected public indexers.
#
# No persistent state, no auth (cluster-internal only, not on any ingress).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      enableServiceLinks: false
      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:v3.3.21
          env:
            - name: TZ
              value: America/New_York
            - name: LOG_LEVEL
              value: info
            - name: CAPTCHA_SOLVER
              value: none
          ports:
            - containerPort: 8191
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          # FlareSolverr boots Chrome on each request; readiness is fast but
          # the first request after a long idle can take ~10s.
          readinessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: media
spec:
  selector:
    app: flaresolverr
  ports:
    - name: http
      port: 8191
      targetPort: 8191
