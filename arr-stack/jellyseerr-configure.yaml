# Idempotent post-deploy config for Jellyseerr. Connects to Jellyfin (as the
# media server / auth source) and to Sonarr + Radarr (as the request targets).
#
# Jellyseerr's setup wizard at /api/v1/* during 'initialized: false' state.
# Once initialized, the same endpoints require auth.
#
# Sequence:
#   1. Wait for jellyseerr's API to respond
#   2. Check /api/v1/status -> if version > 0 and initialized, bail
#   3. POST /api/v1/auth/jellyfin with admin creds — this both validates the
#      Jellyfin connection AND signs jellyseerr in
#   4. POST /api/v1/settings/jellyfin to persist the Jellyfin connection
#   5. POST /api/v1/settings/sonarr (with Sonarr details)
#   6. POST /api/v1/settings/radarr (with Radarr details)
#   7. PUT /api/v1/settings/main with initialized:true
apiVersion: batch/v1
kind: CronJob
metadata:
  name: jellyseerr-configure
  namespace: media
spec:
  schedule: "0 0 1 1 *"
  suspend: true
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: Never
          enableServiceLinks: false
          containers:
            - name: configure
              image: alpine:3.20
              env:
                - name: JF_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: jellyfin-admin
                      key: username
                - name: JF_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: jellyfin-admin
                      key: password
                - name: SONARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: arr-api-keys
                      key: sonarr
                - name: RADARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: arr-api-keys
                      key: radarr
              command:
                - sh
                - -c
                - |
                  set -e
                  apk add --no-cache curl jq >/dev/null
                  JS=http://jellyseerr.media.svc.cluster.local:5055
                  COOKIES=/tmp/cookies.txt

                  echo "==> waiting for jellyseerr"
                  until curl -sf "$JS/api/v1/status" >/dev/null; do sleep 2; done

                  echo "==> auth via jellyfin"
                  # Resolve jellyfin's IP — jellyseerr stores it directly in
                  # settings, separate from port/scheme.
                  JF_IP=$(getent hosts jellyfin.media.svc.cluster.local | awk '{print $1}')
                  curl -sf -c $COOKIES \
                    -H Content-Type:application/json \
                    "$JS/api/v1/auth/jellyfin" -X POST \
                    -d "$(jq -n \
                      --arg user "$JF_USERNAME" \
                      --arg pass "$JF_PASSWORD" \
                      --arg ip "$JF_IP" \
                      '{
                        username: $user,
                        password: $pass,
                        hostname: $ip,
                        port: 8096,
                        useSsl: false,
                        urlBase: "",
                        email: "",
                        serverType: 2
                      }')" \
                    >/dev/null

                  # Persist jellyfin connection. Seerr resolves `hostname`
                  # once and stores it, so we hand it the IP — matches the
                  # sonarr/radarr settings below. `name` is read-only on
                  # Seerr v3 (auto-derived from Jellyfin's ServerName), so
                  # we don't send it. externalHostname is what the
                  # "Play on Jellyfin" deep-link is built from.
                  echo "==> persist jellyfin connection"
                  curl -sf -b $COOKIES \
                    -H Content-Type:application/json \
                    "$JS/api/v1/settings/jellyfin" -X POST \
                    -d "$(jq -n --arg ip "$JF_IP" '{
                      hostname:$ip,
                      port:8096,
                      useSsl:false,
                      urlBase:"",
                      externalHostname:"https://jellyfin.home.chrisscotmartin.com"
                    }')"

                  SONARR_IP=$(getent hosts sonarr.media.svc.cluster.local | awk '{print $1}')
                  RADARR_IP=$(getent hosts radarr.media.svc.cluster.local | awk '{print $1}')

                  # Look up the TRaSH-managed profile IDs by name. Recyclarr
                  # creates these on its first sync; if it hasn't run yet
                  # (fresh cluster) we fall back to "Any" (id 1) and the next
                  # rerun of jellyseerr-configure will pick up the right ID.
                  SONARR_PROFILE_ID=$(curl -sf -H "X-Api-Key:$SONARR_API_KEY" \
                    "http://sonarr.media.svc.cluster.local:8989/api/v3/qualityprofile" \
                    | jq '[.[] | select(.name=="WEB-1080p")][0].id // 1')
                  RADARR_PROFILE_ID=$(curl -sf -H "X-Api-Key:$RADARR_API_KEY" \
                    "http://radarr.media.svc.cluster.local:7878/api/v3/qualityprofile" \
                    | jq '[.[] | select(.name=="HD Bluray + WEB")][0].id // 1')
                  echo "==> sonarr profile id=$SONARR_PROFILE_ID, radarr profile id=$RADARR_PROFILE_ID"

                  # upsert_arr <kind> <payload-jq> applies a settings entry to
                  # /settings/<kind>. POST creates on a fresh wizard; PUT
                  # updates an existing one (Jellyseerr makes `id` read-only
                  # on PUT, so we strip it). The list endpoint returns an
                  # array; we always touch the first/default entry.
                  upsert_arr() {
                    local kind="$1" payload="$2"
                    local existing
                    existing=$(curl -sf -b $COOKIES "$JS/api/v1/settings/$kind" | jq -r '.[0].id // empty')
                    if [ -z "$existing" ]; then
                      echo "==> add $kind"
                      echo "$payload" | curl -sf -b $COOKIES \
                        -H Content-Type:application/json \
                        "$JS/api/v1/settings/$kind" -X POST -d @- >/dev/null
                    else
                      echo "==> update $kind (id=$existing)"
                      echo "$payload" | curl -sf -b $COOKIES \
                        -H Content-Type:application/json \
                        "$JS/api/v1/settings/$kind/$existing" -X PUT -d @- >/dev/null
                    fi
                  }

                  upsert_arr sonarr "$(jq -n \
                    --arg ip "$SONARR_IP" \
                    --arg key "$SONARR_API_KEY" \
                    --argjson pid "$SONARR_PROFILE_ID" \
                    '{
                      name:"Sonarr",
                      hostname:$ip,
                      port:8989,
                      apiKey:$key,
                      useSsl:false,
                      baseUrl:"",
                      activeProfileId:$pid,
                      activeProfileName:"WEB-1080p",
                      activeAnimeProfileId:null,
                      activeDirectory:"/media/tv",
                      activeAnimeDirectory:null,
                      is4k:false,
                      isDefault:true,
                      enableSeasonFolders:true,
                      externalUrl:"https://sonarr.home.chrisscotmartin.com",
                      syncEnabled:true,
                      preventSearch:false
                    }')"

                  upsert_arr radarr "$(jq -n \
                    --arg ip "$RADARR_IP" \
                    --arg key "$RADARR_API_KEY" \
                    --argjson pid "$RADARR_PROFILE_ID" \
                    '{
                      name:"Radarr",
                      hostname:$ip,
                      port:7878,
                      apiKey:$key,
                      useSsl:false,
                      baseUrl:"",
                      activeProfileId:$pid,
                      activeProfileName:"HD Bluray + WEB",
                      activeDirectory:"/media/movies",
                      is4k:false,
                      isDefault:true,
                      minimumAvailability:"released",
                      externalUrl:"https://radarr.home.chrisscotmartin.com",
                      syncEnabled:true,
                      preventSearch:false
                    }')"

                  # Sync libraries from Jellyfin (discovers them) then enable
                  # all of them. ?sync returns the list; ?enable=ID,ID,... toggles.
                  echo "==> sync libraries from jellyfin"
                  LIBS=$(curl -sf -b $COOKIES "$JS/api/v1/settings/jellyfin/library?sync=true")
                  IDS=$(echo "$LIBS" | jq -r '[.[].id] | join(",")')
                  echo "    found: $(echo "$LIBS" | jq -r '[.[].name] | join(", ")')"
                  if [ -n "$IDS" ]; then
                    curl -sf -b $COOKIES "$JS/api/v1/settings/jellyfin/library?enable=$IDS" >/dev/null
                    echo "==> trigger full library scan"
                    curl -sf -b $COOKIES -H Content-Type:application/json \
                      "$JS/api/v1/settings/jellyfin/sync" -X POST \
                      -d '{"start":true}' >/dev/null || true
                  fi

                  echo "==> done"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
