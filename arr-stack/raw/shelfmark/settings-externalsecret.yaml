# Shelfmark settings rendered from Vault. The init container in
# deployment.yaml merges each managed JSON into the matching file under
# /config/plugins/<group>.json (shelfmark's new per-tab storage layout).
# UI-managed cosmetic keys in those files are preserved by the deep merge —
# only the keys we explicitly manage are overwritten.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: shelfmark-settings
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-shelfmark
    kind: SecretStore
  target:
    name: shelfmark-settings
    template:
      engineVersion: v2
      data:
        prowlarr_config.json: |
          {
            "PROWLARR_ENABLED": true,
            "PROWLARR_URL": "http://prowlarr.media.svc.cluster.local:9696",
            "PROWLARR_API_KEY": "{{ .prowlarr_api_key }}"
          }
        prowlarr_clients.json: |
          {
            "PROWLARR_TORRENT_CLIENT": "qbittorrent",
            "QBITTORRENT_URL": "http://qbittorrent.media.svc.cluster.local:8080",
            "QBITTORRENT_USERNAME": "{{ .qbit_username }}",
            "QBITTORRENT_PASSWORD": "{{ .qbit_password }}",
            "QBITTORRENT_CATEGORY": "books-shelfmark",
            "QBITTORRENT_CATEGORY_AUDIOBOOK": "audiobooks-shelfmark",
            "QBITTORRENT_TAG": ["shelfmark"]
          }
  data:
    - secretKey: prowlarr_api_key
      remoteRef:
        key: arr/api-keys
        property: prowlarr
    - secretKey: qbit_username
      remoteRef:
        key: qbittorrent/admin
        property: username
    - secretKey: qbit_password
      remoteRef:
        key: qbittorrent/admin
        property: password
