# MAM (MyAnonaMouse) session token. This is the long-lived API session
# cookie tied to our VPN egress IP/ASN. Used by:
#   - mam-keepalive sidecar in gluetun-qbit-prowlarr (hits MAM's
#     dynamicSeedbox endpoint every 30 min so MAM keeps our session
#     authorized as the egress IP changes within the VPN provider's ASN)
#   - prowlarr indexer config (when added)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mam-session
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-arr
    kind: SecretStore
  target:
    name: mam-session
  data:
    - secretKey: mam_id
      remoteRef:
        key: arr/mam
        property: mam_id
