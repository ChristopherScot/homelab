# Single pod containing Gluetun + qBittorrent + Prowlarr.
# qBit and Prowlarr share Gluetun's network namespace by virtue of being in
# the same pod, so all their egress goes through the VPN tunnel. If gluetun
# crashes / reconnects, qBit and Prowlarr cannot reach the internet — that's
# the kill-switch behavior we want.
#
# Service exposes the apps' webUIs via gluetun's localhost:
#   - qBit:     8080
#   - Prowlarr: 9696
# Other pods reach them as gluetun-qbit-prowlarr.media.svc.cluster.local.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gluetun-qbit-prowlarr
  namespace: media
  labels:
    app: gluetun-qbit-prowlarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gluetun-qbit-prowlarr
  template:
    metadata:
      labels:
        app: gluetun-qbit-prowlarr
    spec:
      enableServiceLinks: false
      # One-shot init that fetches dreulavelle's community Prowlarr indexer
      # pack into the prowlarr config volume's Definitions/Custom/ dir so
      # Prowlarr can use them on top of its built-in schema. Tarball of main
      # so we always pull current — community trackers break/move often. We
      # don't need git history. Runs as root because the prowlarr-config
      # volume's files are root-owned (the prowlarr container runs PUID/
      # PGID=0; see comment on its env above).
      initContainers:
        # Render gluetun's auth config from the ConfigMap template, substituting
        # the API key from the protonvpn-credentials Secret. Goes into an
        # emptyDir that gluetun mounts at /gluetun/auth/config.toml.
        - name: render-gluetun-auth
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -eu
              sed "s|__API_KEY__|$GLUETUN_API_KEY|" /tmpl/config.toml.tmpl > /out/config.toml
              chmod 600 /out/config.toml
          env:
            - name: GLUETUN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-credentials
                  key: GLUETUN_API_KEY
          volumeMounts:
            - name: gluetun-auth-template
              mountPath: /tmpl
            - name: gluetun-auth-rendered
              mountPath: /out
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              memory: 32Mi
        - name: load-indexer-pack
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache curl tar >/dev/null
              DEST=/config/Definitions/Custom
              mkdir -p "$DEST"
              # Wipe Custom/ first so removed definitions don't linger.
              find "$DEST" -mindepth 1 -delete
              echo "==> downloading dreulavelle/Prowlarr-Indexers main"
              curl -sSL https://github.com/dreulavelle/Prowlarr-Indexers/archive/refs/heads/main.tar.gz \
                | tar -xz -C /tmp
              SRC=/tmp/Prowlarr-Indexers-main/Custom
              if [ ! -d "$SRC" ]; then
                echo "ERROR: tarball layout changed, /Custom not found"
                exit 1
              fi
              cp -r "$SRC"/* "$DEST"/
              echo "==> installed $(find "$DEST" -name '*.yml' | wc -l) custom definitions"
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      containers:
        # Gluetun MUST start before the others so the netns has the tunnel
        # before qBit/Prowlarr try to use it. k8s does not order container
        # startup; we rely on Gluetun's healthcheck + its own kill-switch
        # firewall blocking egress until the tunnel is up.
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          # Clear any leftover ip rules from a previous gluetun run before
          # starting. Without this, a crash + container-restart in the same
          # pod netns hits "adding ip rule 101: file exists" forever — the
          # rule from the last invocation never goes away on its own.
          # Recommended fix from the gluetun-on-k8s wiki.
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "(ip rule del table 51820; ip -6 rule del table 51820) || true"
          env:
            - name: VPN_SERVICE_PROVIDER
              value: protonvpn
            - name: VPN_TYPE
              value: wireguard
            # Proton WG private key from Vault (kv/protonvpn/gluetun).
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-credentials
                  key: WIREGUARD_PRIVATE_KEY
            - name: WIREGUARD_ADDRESSES
              value: 10.2.0.2/32
            # Pin to one specific Proton server in M247 (AS9009) — already
            # in MAM's allowlist. One server = stable IP = MouseHole's
            # dynamicSeedbox only re-runs on a true reconnect.
            # Failover: any other US M247 server in Proton's bundled list
            # (US-FL#102, US-CA#321, etc). Verify ASN with ipinfo before
            # switching.
            - name: SERVER_NAMES
              value: US-FL#102
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: VPN_PORT_FORWARDING_PROVIDER
              value: protonvpn
            # Expose gluetun's HTTP API on :8000 so the qBit sync-port
            # mod (in the qbittorrent sidecar) can poll /v1/portforward.
            - name: HTTP_CONTROL_SERVER_ADDRESS
              value: :8000
            - name: HTTP_CONTROL_SERVER_LOG
              value: "off"
            - name: TZ
              value: America/New_York
            - name: FIREWALL_OUTBOUND_SUBNETS
              # Allow LAN access from inside the netns so qBit and Prowlarr
              # can reach in-cluster services (Sonarr/Radarr at 10.43.x.x and
              # the NAS at 192.168.50.220) without going through the VPN.
              value: 10.42.0.0/16,10.43.0.0/16,192.168.50.0/24
          volumeMounts:
            - name: gluetun-config
              mountPath: /gluetun
            - name: gluetun-auth-rendered
              mountPath: /gluetun/auth
            - name: dev-tun
              mountPath: /dev/net/tun
          ports:
            # All ports for sibling containers must be declared on the gluetun
            # container — sibling containers in a shared netns cannot also
            # declare overlapping ports.
            - containerPort: 8080
              name: qbit
            - containerPort: 9696
              name: prowlarr
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              # 512Mi: gluetun's DoT block lists OOM'd it at 256Mi.
              memory: 512Mi
          livenessProbe:
            exec:
              # If gluetun's healthcheck server isn't responding the tunnel is
              # likely dead. Pod gets restarted and qBit/Prowlarr ride along.
              command: ["/gluetun-entrypoint", "healthcheck"]
            periodSeconds: 30
            failureThreshold: 3

        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.1.4
          env:
            # PUID/PGID 0 — Synology NFS squashes server-side writes to admin;
            # running as root in the container avoids the squash-vs-PUID
            # ownership mismatch. See sonarr.yaml for full explanation.
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: America/New_York
            - name: WEBUI_PORT
              value: "8080"
            # GSP docker-mod polls gluetun's HTTP API and updates qBit's
            # listen_port whenever Proton rotates the forwarded port.
            - name: DOCKER_MODS
              value: ghcr.io/t-anc/gsp-qbittorent-gluetun-sync-port-mod:main
            - name: GSP_GTN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-credentials
                  key: GLUETUN_API_KEY
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: media
              mountPath: /media
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 2Gi

        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:2.3.5
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: America/New_York
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi

        # MouseHole — official MAM dynamic-seedbox updater. Polls every
        # 5 min, only POSTs to dynamicSeedbox.php when the egress IP has
        # actually changed (IP changes within our pinned ASN are normal as
        # NordVPN reassigns connections). Respects MAM's 1/hour API rate
        # limit on its own. Web UI on port 5010 (cluster-internal only).
        #
        # mam_id is seeded via a startup hook on the cookie-seed container
        # below — MouseHole's REST API (PUT /state) lets us inject the
        # cookie at boot from the mam-session Secret without manual UI
        # clicks. See mam-externalsecret.yaml for the Vault → Secret path.
        - name: mousehole
          image: tmmrtn/mousehole:0.5.0
          # MouseHole may fail on first startup before VPN is ready, but it
          # reschedules updates every 5 min and will succeed once gluetun
          # establishes the tunnel. Adding a wrapper to wait for VPN proved
          # complex due to missing tools (wget/ca-certs) in the image.
          env:
            - name: TZ
              value: America/New_York
            # v0.5.0 requires auth on /cookie, /state, /updates, /events.
            # Bearer token, sourced from Vault via mam-session ExternalSecret;
            # the seed sidecar + mam-exporter get the same token via env.
            - name: MOUSEHOLE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mam-session
                  key: mousehole_auth_token
            # v0.5.0 default state dir is /var/lib/mousehole; our PVC mounts
            # at /srv/mousehole (pre-existing), so point the app at it.
            - name: MOUSEHOLE_STATE_DIR_PATH
              value: /srv/mousehole
          volumeMounts:
            - name: mousehole-state
              mountPath: /srv/mousehole
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
        # Sidecar that ensures MouseHole has the current mam_id cookie.
        # Runs once at pod start (after MouseHole is reachable), then
        # idles. If the Vault secret rotates, deleting this pod will
        # re-seed on next start.
        - name: mousehole-seed
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - |
              # /health is the only unauth'd endpoint in v0.5.0, use it for readiness.
              until curl -sf http://localhost:5010/health >/dev/null 2>&1; do
                echo "waiting for mousehole..."; sleep 2
              done
              echo "seeding mam_id into mousehole"
              # v0.5.0: PUT /cookie with body {"value": "..."}, bearer auth required.
              # Response body includes hasCookie=true iff persistence worked.
              RESP=$(curl -sS -X PUT http://localhost:5010/cookie \
                -H "Authorization: Bearer $MOUSEHOLE_AUTH_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"value\":\"$MAM_ID\"}")
              echo "PUT /cookie -> $RESP"
              case "$RESP" in
                *'"hasCookie":true'*) echo " ✓ cookie set" ;;
                *) echo " ✗ cookie NOT set; check MOUSEHOLE_AUTH_TOKEN + mam_id" >&2 ;;
              esac
              # Force an immediate MAM contact so lastMamContact reflects the new cookie.
              curl -sS -X POST http://localhost:5010/updates \
                -H "Authorization: Bearer $MOUSEHOLE_AUTH_TOKEN" >/dev/null || true
              # Sleep forever so the container doesn't restart
              tail -f /dev/null
          env:
            - name: MAM_ID
              valueFrom:
                secretKeyRef:
                  name: mam-session
                  key: mam_id
            - name: MOUSEHOLE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mam-session
                  key: mousehole_auth_token
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi

        # Polls MAM /jsonLoad.php every 60s and pushes Prometheus metrics
        # (ratio, bonus, HnR counts, etc.) to in-cluster VictoriaMetrics
        # via remote_write. Lives in this pod so it inherits the VPN's
        # pinned-ASN egress (MAM session cookie is ASN-bound). Pulls the
        # current cookie from MouseHole at localhost:5010, so it survives
        # ASN rotations.
        - name: mam-exporter
          image: python:3.13-alpine
          command:
            - sh
            - -c
            - |
              pip install --quiet --root-user-action ignore python-snappy 2>/dev/null \
                || pip install --quiet --root-user-action ignore cramjam
              exec python3 /app/mam_exporter.py
          env:
            - name: INTERVAL_SECONDS
              value: "60"
            - name: LOCAL_REMOTE_WRITE_URL
              value: "http://victoria-metrics.monitoring.svc.cluster.local:8428/api/v1/write"
            - name: MAM_ID
              valueFrom:
                secretKeyRef:
                  name: mam-session
                  key: mam_id
          volumeMounts:
            - name: mam-exporter-script
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 128Mi

        # Reapplies qBittorrent preferences from the qbittorrent-prefs
        # ConfigMap on every pod start. Survives PVC loss, settings drift,
        # and chart re-installs. Replaces the previous suspended
        # qbittorrent-configure CronJob (which had to be triggered manually
        # and was easy to forget after editing the JSON).
        - name: qbit-configure
          image: alpine:3.20
          env:
            - name: QBT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-admin
                  key: username
            - name: QBT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-admin
                  key: password
          command:
            - sh
            - -c
            - |
              apk add --no-cache curl >/dev/null
              # Same netns as qBit via the gluetun pod, so localhost works.
              until curl -sf http://localhost:8080/ -o /dev/null; do
                echo "waiting for qbit..."; sleep 2
              done
              COOKIE=$(curl -sfi http://localhost:8080/api/v2/auth/login \
                --data-urlencode "username=$QBT_USERNAME" \
                --data-urlencode "password=$QBT_PASSWORD" \
                -H "Referer: http://localhost:8080" \
                | awk '/^[Ss]et-[Cc]ookie:/{sub(/^[Ss]et-[Cc]ookie: /,""); split($0,a,";"); print a[1]}')
              if [ -z "$COOKIE" ]; then
                echo "ERROR: login failed (check qbittorrent-admin Secret)" >&2
                exit 1
              fi
              curl -sf http://localhost:8080/api/v2/app/setPreferences \
                -H "Cookie: $COOKIE" \
                --data-urlencode "json=$(cat /prefs/prefs.json)"
              echo "✓ prefs applied from ConfigMap"
              # Sleep forever so the container doesn't restart and re-trigger
              # the apply on every k8s liveness check.
              tail -f /dev/null
          volumeMounts:
            - name: qbit-prefs
              mountPath: /prefs
              readOnly: true
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi

      volumes:
        - name: gluetun-config
          persistentVolumeClaim:
            claimName: gluetun-config
        - name: gluetun-auth-template
          configMap:
            name: gluetun-auth-template
        - name: gluetun-auth-rendered
          emptyDir: {}
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: prowlarr-config
          persistentVolumeClaim:
            claimName: prowlarr-config-longhorn
        # MouseHole's persistent state (cookie + last-seen-IP cache).
        # Tiny — emptyDir is fine; if the pod restarts, the seed
        # sidecar re-injects the cookie from the Secret.
        - name: mousehole-state
          emptyDir: {}
        - name: mam-exporter-script
          configMap:
            name: mam-exporter-script
        - name: qbit-prefs
          configMap:
            name: qbittorrent-prefs
        - name: media
          persistentVolumeClaim:
            claimName: media-data
        - name: dev-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
spec:
  selector:
    app: gluetun-qbit-prowlarr
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: media
spec:
  selector:
    app: gluetun-qbit-prowlarr
  ports:
    - name: http
      port: 9696
      targetPort: 9696
