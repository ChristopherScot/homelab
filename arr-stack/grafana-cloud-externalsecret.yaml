# Grafana Cloud Prometheus remote_write creds, mirrored from Vault into
# the media namespace. Used by the mam-exporter sidecar in the
# gluetun-qbit-prowlarr deployment to ship MAM stats.
#
# Why mirrored (not consumed cross-namespace from monitoring/): k8s Secrets
# are namespace-scoped and ExternalSecrets has no native cross-namespace
# read for our policy model. Each namespace that needs the token gets its
# own ExternalSecret pointing at the same Vault path.
#
# Auth uses the media-grafana-cloud Vault role (declared in
# bootstrap/vault-policies.sh) — narrow scope, only this one kv path.
#
# URL/username are public IDs (Grafana Cloud tenant + user — same as
# monitoring/externalsecret.yaml uses). Only `token` is sensitive and
# pulled from kv/grafana-cloud.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-media-grafana-cloud
  namespace: media
spec:
  provider:
    vault:
      server: http://vault.default.svc.cluster.local:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: media-grafana-cloud
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-cloud-metrics
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-media-grafana-cloud
    kind: SecretStore
  target:
    name: grafana-cloud-metrics
    template:
      type: Opaque
      data:
        url:      "https://prometheus-prod-13-prod-us-east-0.grafana.net/api/prom/push"
        username: "1054401"
        token:    "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: grafana-cloud
        property: token
