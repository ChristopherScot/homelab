---
# Jellyfin is special: real clients (Apple TV, Roku, etc.) can't follow the
# Authelia redirect chain. So jellyfin.home.chrisscotmartin.com gets TLS but
# NOT forward-auth — Jellyfin's own login handles that. Browser users still
# go through Authelia first by visiting via the Jellyseerr "watch now" link
# (which redirects through auth-protected paths) but direct API access works.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin
  namespace: media
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Jellyfin streams large files; raise nginx timeouts.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: external
  tls:
    - hosts: [jellyfin.home.chrisscotmartin.com]
      secretName: jellyfin-tls
  rules:
    - host: jellyfin.home.chrisscotmartin.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin
                port:
                  number: 8096
