# All arr-stack ingresses. Two annotation patterns:
#
#   - cert-manager.io/cluster-issuer: letsencrypt-prod
#       Triggers per-host LE cert via DNS-01 (Route53). Each cert lives in
#       its own Secret in this namespace.
#
#   - nginx.ingress.kubernetes.io/auth-url + auth-signin
#       Forward-auth to Authelia. Unauthenticated requests get bounced to
#       https://auth.home.chrisscotmartin.com to log in, then redirected
#       back. Authelia's access_control rules (in authelia/configmap.yaml)
#       decide who can access what.
#
# Hosts that allow the `users` group: seerr, jellyfin (1FA).
# Hosts that require `admins` + 2FA: sonarr, radarr, prowlarr, bazarr, qbit.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarr
  namespace: media
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    gethomepage.dev/enabled: "true"
    gethomepage.dev/widget.type: "sonarr"
    gethomepage.dev/widget.url: "http://sonarr.media.svc.cluster.local:8989"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
    gethomepage.dev/pod-selector: "app=sonarr"
    gethomepage.dev/name: "Sonarr"
    gethomepage.dev/description: "TV library manager"
    gethomepage.dev/group: "Media"
    gethomepage.dev/icon: "sonarr.png"
    nginx.ingress.kubernetes.io/auth-url: "http://authelia.authelia.svc.cluster.local/api/verify"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.home.chrisscotmartin.com/?rd=$escaped_request_uri"
    # NOTE: requires `allow-snippet-annotations: "true"` and
    # `annotations-risk-level: Critical` in the ingress-nginx ConfigMap.
    # Set out-of-band via kubectl patch; ingress-nginx isn't in git yet.
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header X-Forwarded-Method $request_method;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Forwarded-For $remote_addr;
    nginx.ingress.kubernetes.io/auth-response-headers: "Remote-User,Remote-Name,Remote-Email,Remote-Groups"
spec:
  ingressClassName: external
  tls:
    - hosts: [sonarr.home.chrisscotmartin.com]
      secretName: sonarr-tls
  rules:
    - host: sonarr.home.chrisscotmartin.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sonarr
                port:
                  number: 8989
