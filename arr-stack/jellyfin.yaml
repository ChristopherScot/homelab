apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      enableServiceLinks: false
      # Pinned to pop-os because that's the only node with Intel QuickSync
      # (Iris Plus 655). The other two nodes are AMD APUs whose VAAPI support
      # in Jellyfin is rougher. Pin avoids surprise CPU-transcode after a
      # reschedule.
      nodeSelector:
        kubernetes.io/hostname: pop-os
      securityContext:
        # Add the host's video (44) and render (110) groups so the container
        # user (PUID 1000) can open /dev/dri/renderD128.
        supplementalGroups: [44, 110]
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.10.3
          env:
            - name: TZ
              value: America/New_York
            - name: JELLYFIN_PublishedServerUrl
              value: https://jellyfin.home.chrisscotmartin.com
          ports:
            - containerPort: 8096
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: cache
              mountPath: /cache
            - name: media
              mountPath: /media
              readOnly: false
            - name: dri
              mountPath: /dev/dri
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 4Gi
          # Jellyfin is heavy on first start (DB init); generous probe delays.
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config-nfs
        - name: cache
          persistentVolumeClaim:
            claimName: jellyfin-cache
        - name: media
          persistentVolumeClaim:
            claimName: media-data
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media
spec:
  selector:
    app: jellyfin
  ports:
    - name: http
      port: 8096
      targetPort: 8096
