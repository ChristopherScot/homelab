# API keys for sonarr, radarr, prowlarr — auto-generated by each app on first
# start, then read out of their config.xml files and stored in Vault. Recyclarr
# (and the *-configure Jobs) read these from the resulting Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arr-api-keys
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-arr
    kind: SecretStore
  target:
    name: arr-api-keys
  data:
    - secretKey: sonarr
      remoteRef:
        key: arr/api-keys
        property: sonarr
    - secretKey: radarr
      remoteRef:
        key: arr/api-keys
        property: radarr
    - secretKey: prowlarr
      remoteRef:
        key: arr/api-keys
        property: prowlarr
    - secretKey: readarr
      remoteRef:
        key: arr/api-keys
        property: readarr
    - secretKey: bazarr
      remoteRef:
        key: arr/api-keys
        property: bazarr
