# Idempotent post-deploy config for Jellyfin. Walks the first-run wizard
# entirely via API. Skips if already configured.
#
# Steps:
#   1. Check if /Startup/Configuration is reachable (200) -> wizard pending
#   2. POST initial culture/locale settings
#   3. POST initial admin user
#   4. POST library config: TV (/media/tv) + Movies (/media/movies)
#   5. POST remote-access settings (already behind ingress so disable UPNP etc)
#   6. POST /Startup/Complete to finalize
#
# After the wizard, Jellyfin is locked behind auth. The Job exits and we'll
# extract the admin's API key out-of-band into Vault.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: jellyfin-configure
  namespace: media
spec:
  schedule: "0 0 1 1 *"
  suspend: true
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 3600  # keep failed pods for an hour for inspection
      template:
        spec:
          restartPolicy: Never
          enableServiceLinks: false
          containers:
            - name: configure
              image: alpine:3.20
              env:
                - name: ADMIN_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: jellyfin-admin
                      key: username
                - name: ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: jellyfin-admin
                      key: password
              command:
                - sh
                - -c
                - |
                  set -e
                  apk add --no-cache curl jq >/dev/null
                  JF=http://jellyfin.media.svc.cluster.local:8096

                  echo "==> waiting for jellyfin"
                  until curl -sf "$JF/health" >/dev/null 2>&1; do sleep 2; done

                  H="-H Content-Type:application/json"

                  # Detect wizard state: /Startup/Configuration is unauth in
                  # wizard mode, 401 once wizard is complete.
                  CODE=$(curl -s -o /dev/null -w '%{http_code}' "$JF/Startup/Configuration")
                  if [ "$CODE" = "200" ]; then
                    echo "==> running first-run wizard"

                    echo "==> setting culture"
                    curl -sf $H "$JF/Startup/Configuration" -X POST \
                      -d '{"UICulture":"en-US","MetadataCountryCode":"US","PreferredMetadataLanguage":"en"}'

                    echo "==> creating admin user '$ADMIN_USERNAME'"
                    curl -sf $H "$JF/Startup/User" -X POST \
                      -d "$(jq -n --arg n "$ADMIN_USERNAME" --arg p "$ADMIN_PASSWORD" '{Name:$n, Password:$p}')"

                    echo "==> setting remote access (no UPnP — ingress proxies us)"
                    curl -sf $H "$JF/Startup/RemoteAccess" -X POST \
                      -d '{"EnableRemoteAccess":true,"EnableAutomaticPortMapping":false}'

                    echo "==> finalizing"
                    curl -sf $H "$JF/Startup/Complete" -X POST -d ''
                  else
                    echo "==> wizard already complete (code=$CODE), proceeding to libraries"
                  fi

                  # ---- Libraries ----
                  # Wizard locked the API. Log in as the new admin and add
                  # /media/tv (TV shows) + /media/movies (Movies) libraries.
                  # Idempotent: skip if a library with that name already exists.
                  echo "==> logging in as $ADMIN_USERNAME"
                  TOKEN=$(curl -sf $H \
                    -H 'Authorization: MediaBrowser Client="setup", Device="setup", DeviceId="setup", Version="1.0"' \
                    "$JF/Users/AuthenticateByName" -X POST \
                    -d "$(jq -n --arg n "$ADMIN_USERNAME" --arg p "$ADMIN_PASSWORD" '{Username:$n, Pw:$p}')" \
                    | jq -r .AccessToken)
                  if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
                    echo "    failed to log in" >&2
                    exit 1
                  fi
                  AH="-H X-Emby-Token:$TOKEN"

                  add_lib() {
                    local name="$1" type="$2" path="$3"
                    if curl -sf $AH "$JF/Library/VirtualFolders" | jq -e ".[] | select(.Name==\"$name\")" >/dev/null 2>&1; then
                      echo "==> library '$name' already exists, skipping"
                      return 0
                    fi
                    echo "==> adding library '$name' (type=$type path=$path)"
                    # collectionType is the URL param (tvshows / movies); path is in body.
                    # refreshLibrary=false because we'll trigger scan once at end.
                    curl -sf $AH -H Content-Type:application/json \
                      "$JF/Library/VirtualFolders?name=$name&collectionType=$type&refreshLibrary=false" \
                      -X POST -d "$(jq -n --arg p "$path" '{LibraryOptions: {PathInfos: [{Path: $p}], EnableRealtimeMonitor: true, EnableChapterImageExtraction: false, ExtractChapterImagesDuringLibraryScan: false}}')"
                  }

                  add_lib "TV Shows" "tvshows" "/media/tv"
                  add_lib "Movies" "movies" "/media/movies"

                  # Set a stable display name so clients don't see the pod hash
                  # (jellyfin-5d47cb98cf-zfq78 etc) in the server-picker.
                  echo "==> setting ServerName + PublishedServerUrl"
                  curl -sf $AH "$JF/System/Configuration" \
                    | jq '.ServerName = "Homelab Jellyfin" | .PublishedServerUrl = "https://jellyfin.home.chrisscotmartin.com"' \
                    | curl -sf $AH -H Content-Type:application/json \
                      "$JF/System/Configuration" -X POST -d @-

                  # Hardware acceleration. /dev/dri is mounted, supplementalGroups
                  # 44+110 cover the host's video+render groups. Intel QSV decode
                  # for h264/hevc/vp9/av1; tonemapping enabled for HDR->SDR.
                  echo "==> setting encoding config (Intel QSV)"
                  curl -sf $AH "$JF/System/Configuration/encoding" \
                    | jq '.HardwareAccelerationType = "qsv"
                          | .VaapiDevice = "/dev/dri/renderD128"
                          | .EnableHardwareEncoding = true
                          | .EnableTonemapping = true
                          | .EnableVppTonemapping = true
                          | .HardwareDecodingCodecs = ["h264","hevc","vp9","av1"]
                          | .EnableIntelLowPowerH264HwEncoder = true
                          | .EnableIntelLowPowerHevcHwEncoder = true' \
                    | curl -sf $AH -H Content-Type:application/json \
                      "$JF/System/Configuration/encoding" -X POST -d @-

                  echo "==> triggering library scan"
                  curl -sf $AH "$JF/Library/Refresh" -X POST -d '' || true

                  echo "==> done"
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
