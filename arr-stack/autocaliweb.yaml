apiVersion: apps/v1
kind: Deployment
metadata:
  name: autocaliweb
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: autocaliweb
  template:
    metadata:
      labels:
        app: autocaliweb
    spec:
      enableServiceLinks: false
      # Patch upstream typo in usermanagement.py: code references
      # config_reverse_proxy_login_email_header_name, but the actual
      # ConfigSQL column is config_reverse_proxy_email_header_name.
      # Without this fix, header-auth auto-provisioning crashes with
      # AttributeError on first request from a new user. Drop this
      # initContainer once upstream fixes the bug:
      # https://codeberg.org/gelbphoenix/autocaliweb (cps/usermanagement.py)
      initContainers:
        - name: patch-usermanagement
          image: gelbphoenix/autocaliweb:latest
          command:
            - sh
            - -c
            - |
              set -e
              cp /app/autocaliweb/cps/usermanagement.py /patched/usermanagement.py
              # Bug 1: code reads a config attribute that doesn't exist on
              # ConfigSQL (typo: extra "_login_" segment).
              sed -i 's/config_reverse_proxy_login_email_header_name/config_reverse_proxy_email_header_name/g' /patched/usermanagement.py
              # Bug 2: auto-provisioned users inherit config_default_language
              # which defaults to "all" — not a valid Babel locale, so every
              # request from the new user crashes with UnknownLocaleError
              # until you manually update the user's locale in app.db.
              sed -i 's|user.locale = config.config_default_language|user.locale = "en"|' /patched/usermanagement.py
          volumeMounts:
            - name: patched-source
              mountPath: /patched
      containers:
        - name: autocaliweb
          image: gelbphoenix/autocaliweb:latest
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 8083
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: ingest
              mountPath: /acw-book-ingest
            - name: media
              mountPath: /calibre-library
              subPath: books
            - name: patched-source
              mountPath: /app/autocaliweb/cps/usermanagement.py
              subPath: usermanagement.py
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: autocaliweb-config-nfs
        - name: ingest
          persistentVolumeClaim:
            claimName: acw-ingest-nfs
        - name: media
          persistentVolumeClaim:
            claimName: media-data
        - name: patched-source
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: autocaliweb
  namespace: media
spec:
  selector:
    app: autocaliweb
  ports:
    - name: http
      port: 8083
      targetPort: 8083
