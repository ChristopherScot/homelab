# Calibre-Web-Automated (the upstream crocodilestick image, NOT the
# gelbphoenix/autocaliweb fork on Codeberg). The fork has two header-auth
# bugs that block reverse-proxy SSO with auto-provisioning; upstream
# doesn't have them. Resource names below stay "autocaliweb" only so we
# don't have to touch the ingress / DNS / Authelia rules. Filename and
# selectors will follow in a later cleanup PR.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autocaliweb
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: autocaliweb
  template:
    metadata:
      labels:
        app: autocaliweb
    spec:
      enableServiceLinks: false
      containers:
        - name: calibre-web-automated
          image: crocodilestick/calibre-web-automated:latest
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: America/New_York
            # NFS mounts don't propagate inotify reliably across pods.
            # Shelfmark drops files into the same RWX PVC mounted here as
            # the ingest folder; CWA needs to poll, not watch.
            - name: NETWORK_SHARE_MODE
              value: "true"
          ports:
            - containerPort: 8083
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: ingest
              mountPath: /cwa-book-ingest
            - name: media
              mountPath: /calibre-library
              subPath: books
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: autocaliweb-config-nfs
        - name: ingest
          persistentVolumeClaim:
            claimName: acw-ingest-nfs
        - name: media
          persistentVolumeClaim:
            claimName: media-data
---
apiVersion: v1
kind: Service
metadata:
  name: autocaliweb
  namespace: media
spec:
  selector:
    app: autocaliweb
  ports:
    - name: http
      port: 8083
      targetPort: 8083
