# Calibre-Web-Automated (the upstream crocodilestick image, NOT the
# gelbphoenix/autocaliweb fork on Codeberg). The fork has two header-auth
# bugs that block reverse-proxy SSO with auto-provisioning; upstream
# doesn't have them. Resource names below stay "autocaliweb" only so we
# don't have to touch the ingress / DNS / Authelia rules. Filename and
# selectors will follow in a later cleanup PR.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autocaliweb
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: autocaliweb
  template:
    metadata:
      labels:
        app: autocaliweb
    spec:
      enableServiceLinks: false
      containers:
        - name: calibre-web-automated
          image: crocodilestick/calibre-web-automated:latest
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: America/New_York
            # NFS mounts don't propagate inotify reliably across pods.
            # Shelfmark drops files into the same RWX PVC mounted here as
            # the ingest folder; CWA needs to poll, not watch.
            - name: NETWORK_SHARE_MODE
              value: "true"
          ports:
            - containerPort: 8083
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: ingest
              mountPath: /cwa-book-ingest
            - name: books
              mountPath: /calibre-library
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
          # Self-heal hangs: ingest worker can deadlock the Flask process
          # (observed: stale inotify state on already-deleted files causing
          # tight reprocess loops). If /login stops answering for ~3 min,
          # kubelet restarts the pod.
          # /static/favicon.ico is served without auth and doesn't trigger
          # Flask session/CSRF setup, so it stays cheap during heavy library
          # scans that previously made /login time out and trip liveness.
          startupProbe:
            httpGet: { path: /static/favicon.ico, port: 8083 }
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /static/favicon.ico, port: 8083 }
            failureThreshold: 10
            periodSeconds: 30
            timeoutSeconds: 30
          readinessProbe:
            httpGet: { path: /static/favicon.ico, port: 8083 }
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: autocaliweb-config-longhorn
        - name: ingest
          persistentVolumeClaim:
            claimName: acw-ingest-longhorn
        - name: books
          persistentVolumeClaim:
            claimName: books-longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: autocaliweb
  namespace: media
spec:
  selector:
    app: autocaliweb
  ports:
    - name: http
      port: 8083
      targetPort: 8083
