# Two interactive Claude Code sessions (claude-session-0 / -1) for parallel
# multitasking. StatefulSet so each replica gets its own stable workspace PVC
# (separate repo clones + Claude login state → no git/state collisions).
#
# Usage: kubectl exec -it -n claude-pods claude-session-0 -- bash
#        then `claude`, then `/remote-control` to drive from phone/web.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude-session
  namespace: claude-pods
spec:
  serviceName: claude-session
  replicas: 2
  selector:
    matchLabels:
      app: claude-session
  template:
    metadata:
      labels:
        app: claude-session
    spec:
      serviceAccountName: claude-session
      # Private ghcr image — pull secret from the ghcr-pull ExternalSecret.
      imagePullSecrets:
        - name: ghcr-pull
      securityContext:
        fsGroup: 1000
      containers:
        - name: claude
          image: ghcr.io/christopherscot/claude-pod:latest
          # Mutable :latest, re-pulled every rollout. Single maintainer who
          # controls all image builds — the immutable-tag ceremony isn't worth
          # it here; rebuild + rollout restart to update.
          imagePullPolicy: Always
          # Wire git HTTPS push creds, pre-clone any repos listed in
          # CLONE_REPOS, then idle. You exec in, start `claude`, then
          # /remote-control.
          command:
            - bash
            - -lc
            - |
              set +e
              # $HOME (/home/node) is mounted on the persistent PVC, so the
              # image's baked dotfiles (oh-my-zsh, nvim config, .zshrc) are
              # shadowed on first boot. Seed them from the image's pristine
              # copy (/opt/home-skel) if this is a fresh/empty home, so they
              # persist AND stay user-editable. Marker file = already seeded.
              if [ ! -f "$HOME/.home-seeded" ]; then
                cp -an /opt/home-skel/. "$HOME/" 2>/dev/null
                touch "$HOME/.home-seeded"
              fi
              # Image-managed config files always track the image (not frozen
              # at first-seed): a stale persisted .tmux.conf with continuum
              # auto-restore once kept resurrecting dead rc/work sessions and
              # broke RC auto-start. Re-sync these on every boot. (User-editable
              # state like nvim plugins, shell history, repos is NOT touched;
              # user shell customization belongs in $ZSH_CUSTOM, also untouched.)
              cp -f /opt/home-skel/.tmux.conf "$HOME/.tmux.conf" 2>/dev/null || true
              cp -f /opt/home-skel/.zshrc     "$HOME/.zshrc"     2>/dev/null || true
              git config --global credential.helper store
              cp /run/secrets/git/.git-credentials "$HOME/.git-credentials" 2>/dev/null || true
              chmod 600 "$HOME/.git-credentials" 2>/dev/null || true
              # GCP auth: if the deploy key is mounted, activate it so gcloud
              # is ready for ephemeral deploys on boot. Raw JSON (no base64).
              if [ -f /run/secrets/gcp/key.json ]; then
                gcloud auth activate-service-account --key-file=/run/secrets/gcp/key.json --quiet 2>/dev/null \
                  && gcloud config set project "$(cat /run/secrets/gcp/project 2>/dev/null)" --quiet 2>/dev/null \
                  && gcloud auth configure-docker us-central1-docker.pkg.dev --quiet 2>/dev/null \
                  && echo "gcloud authed for deploy" || echo "WARN: gcloud auth failed"
              fi
              # Per-pod repos by StatefulSet ordinal, read from a Vault-backed
              # secret file (/run/secrets/repos/pod<ordinal>) so specific repo
              # names aren't committed to this repo. Falls back to CLONE_REPOS.
              ORD="${HOSTNAME##*-}"
              REPOS="$(cat "/run/secrets/repos/pod${ORD}" 2>/dev/null || echo "${CLONE_REPOS:-}")"
              echo "pod ordinal=$ORD -> $(echo "$REPOS" | wc -w) repo(s)"
              # space/comma/newline-separated; full URLs or owner/repo slugs
              # (assumed github.com). Idempotent: skips a repo dir that exists.
              primary=""
              for r in $(echo "${REPOS:-}" | tr ',\n' '  '); do
                [ -z "$r" ] && continue
                case "$r" in
                  http*://*|git@*) url="$r" ;;
                  */*)             url="https://github.com/$r.git" ;;
                  *)               echo "skip unrecognized repo ref: $r"; continue ;;
                esac
                dir="/workspace/$(basename "$r" .git)"
                [ -z "$primary" ] && primary="$dir"   # first repo = primary
                if [ -d "$dir/.git" ]; then
                  echo "repo present: $dir"
                else
                  echo "cloning $url -> $dir"
                  git clone "$url" "$dir" || echo "WARN: clone failed: $url"
                fi
              done
              # record the primary repo dir so `rclaude` opens there by default
              [ -n "$primary" ] && echo "$primary" > /workspace/.primary-repo
              # Install tmux plugins (resurrect/continuum) via tpm if missing.
              # tpm install needs a running tmux server with the conf sourced.
              if [ -d "$HOME/.tmux/plugins/tpm" ] && [ ! -d "$HOME/.tmux/plugins/tmux-resurrect" ]; then
                tmux new-session -d -s _tpm 2>/dev/null
                tmux source-file "$HOME/.tmux.conf" 2>/dev/null
                "$HOME/.tmux/plugins/tpm/bin/install_plugins" >/dev/null 2>&1 || true
                tmux kill-session -t _tpm 2>/dev/null
              fi
              # Always-on Remote Control, the way that actually survives:
              # run interactive `claude --remote-control` in a dedicated `rc`
              # tmux session that we NEVER attach to. Why this works where the
              # others didn't:
              #   - server mode (`claude remote-control`) came up Capacity 0/32
              #     headless -> phone spun. Avoided.
              #   - interactive RC inside an *attached* pane died on SIGHUP when
              #     you closed the terminal -> phone lost it. Avoided: nothing
              #     ever attaches to `rc`, so there's no terminal to close and no
              #     HUP; tmux holds the pty, claude stays up + connectable.
              # The session is named by the pod's primary repo so the two pods
              # are distinguishable in the claude.ai/code session list.
              tmux kill-server 2>/dev/null
              tmux start-server 2>/dev/null
              # Name it "<repo>-persistent" so it's distinct in the claude.ai/code
              # list from the per-work-session RC envs ("<repo>" or "<name>").
              RC_NAME="$(basename "$(cat /workspace/.primary-repo 2>/dev/null || echo workspace)")-persistent"
              RC_DIR="$(cat /workspace/.primary-repo 2>/dev/null || echo /workspace)"
              [ -d "$RC_DIR" ] || RC_DIR=/workspace
              tmux new-session -d -s rc -c "$RC_DIR" \
                "while true; do claude --remote-control \"$RC_NAME\"; echo 'RC exited; restart 5s'; sleep 5; done"
              # The `work` layout (nvim + claude + shell) is built by `rclaude N`
              # on attach (needs a real TTY). It's separate from the `rc` session
              # above. Run `rclaude N` from any machine to start/attach work.
              exec sleep infinity
          env:
            - name: HOME
              value: /home/node
            # Engineer who owns these pods — used by `dp <tag>` to deploy to
            # webapp--$OWNER. Per-employee envs would set this per-pod (e.g.
            # from the per-ordinal Vault secret) in the multi-user future.
            - name: OWNER
              value: "chris"
            # Per-pod repo lists come from the Vault-backed claude-repos secret
            # (mounted at /run/secrets/repos/pod<ordinal>), not env, so repo
            # names stay out of this repo.
            # Git identity for commits made from these sessions.
            - name: GIT_AUTHOR_NAME
              value: "Chris (claude-pod)"
            - name: GIT_COMMITTER_NAME
              value: "Chris (claude-pod)"
            - name: GIT_AUTHOR_EMAIL
              value: "christopher.scot.martin@gmail.com"
            - name: GIT_COMMITTER_EMAIL
              value: "christopher.scot.martin@gmail.com"
          volumeMounts:
            # $HOME on the SSD tier — latency-sensitive (interactive shell,
            # zsh history fsyncs, nvim state, Claude login). On the HDD tier
            # this caused severe typing lag (~41s for 50 synced writes).
            - name: home
              mountPath: /home/node
            # /workspace on the HDD capacity tier — bulk, re-clonable repos,
            # not latency-sensitive.
            - name: workspace
              mountPath: /workspace
            # GitHub token for push (mounted from secret) — sessions source it.
            - name: git-creds
              mountPath: /run/secrets/git
              readOnly: true
            # GCP deploy key (SA) for ephemeral deploys.
            - name: gcp-deploy
              mountPath: /run/secrets/gcp
              readOnly: true
            # Per-pod repo lists (Vault-backed; pod<ordinal> files).
            - name: repos
              mountPath: /run/secrets/repos
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: git-creds
          secret:
            secretName: claude-git-creds
        - name: gcp-deploy
          secret:
            secretName: gcp-deploy
            optional: true
        - name: repos
          secret:
            secretName: claude-repos
            optional: true
  volumeClaimTemplates:
    # $HOME — SSD (1 replica). Small + latency-sensitive; the interactive
    # experience lives here. Single replica keeps SSD usage modest.
    - metadata:
        name: home
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn-single-ssd
        resources:
          requests:
            storage: 5Gi
    # /workspace — HDD capacity tier (1 replica). Bulk, re-clonable repos.
    - metadata:
        name: workspace
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn-hdd-single
        resources:
          requests:
            storage: 10Gi
