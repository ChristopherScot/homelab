# Git push credentials for the Claude session pods, from Vault
# kv/claude-pods/git (GitHub username + token with repo scope). The pods
# push to the homelab repo over HTTPS using these.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: claude-pods
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-claude-pods
  namespace: claude-pods
spec:
  provider:
    vault:
      server: http://vault.default.svc.cluster.local:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: claude-pods
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: claude-git-creds
  namespace: claude-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-claude-pods
    kind: SecretStore
  target:
    name: claude-git-creds
    template:
      type: Opaque
      data:
        # git credential-store format; the pod points GIT_ASKPASS/credential
        # helper here (or copies to ~/.git-credentials) to push over HTTPS.
        .git-credentials: "https://{{ .username }}:{{ .token }}@github.com"
        username: "{{ .username }}"
        token: "{{ .token }}"
  data:
    - secretKey: username
      remoteRef: { key: claude-pods/git, property: username }
    - secretKey: token
      remoteRef: { key: claude-pods/git, property: token }
---
# Git author email for commit identity — kept in Vault (not this manifest) so a
# personal email isn't committed in plaintext. From kv/claude-pods/git
# (property: email); injected as GIT_AUTHOR_EMAIL / GIT_COMMITTER_EMAIL. Kept as
# its OWN ExternalSecret (not merged into claude-git-creds) so a missing `email`
# property can't fail-sync and take the git PUSH credentials down with it.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: claude-git-identity
  namespace: claude-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-claude-pods
    kind: SecretStore
  target:
    name: claude-git-identity
    template:
      type: Opaque
      data:
        email: "{{ .email }}"
  data:
    - secretKey: email
      remoteRef: { key: claude-pods/git, property: email }
---
# Kernel (kernel.sh) API key — lets pods provision cloud browsers via `kbrowser`
# (agent-browser drives them over CDP; no local Chrome in the image). Stored in
# Vault at kv/claude-pods/kernel (property: api_key); injected as KERNEL_API_KEY.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kernel-api
  namespace: claude-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-claude-pods
    kind: SecretStore
  target:
    name: kernel-api
    template:
      type: Opaque
      data:
        api_key: "{{ .api_key }}"
  data:
    - secretKey: api_key
      remoteRef: { key: claude-pods/kernel, property: api_key }
---
# Per-pod repo lists (kept in Vault, not the manifest, so specific repo names
# aren't committed to this repo). Keys pod0/pod1 -> mounted as files the
# entrypoint reads by ordinal.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: claude-repos
  namespace: claude-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-claude-pods
    kind: SecretStore
  target:
    name: claude-repos
    template:
      type: Opaque
      data:
        pod0: "{{ .pod0 }}"
        pod1: "{{ .pod1 }}"
  data:
    - secretKey: pod0
      remoteRef: { key: claude-pods/repos, property: pod0 }
    - secretKey: pod1
      remoteRef: { key: claude-pods/repos, property: pod1 }
---
# GCP deploy key (a deploy service-account) so pods can run `gcloud run
# deploy` for ephemeral envs. SA key + project both come from Vault; the
# entrypoint base64-decodes the key and activates it.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gcp-deploy
  namespace: claude-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-claude-pods
    kind: SecretStore
  target:
    name: gcp-deploy
    template:
      type: Opaque
      data:
        # Raw SA key JSON (no base64 — Vault + ESO handle multi-line fine).
        key.json: "{{ .key_json }}"
        project: "{{ .project }}"
  data:
    - secretKey: key_json
      remoteRef: { key: claude-pods/gcp-deploy, property: key_json }
    - secretKey: project
      remoteRef: { key: claude-pods/gcp-deploy, property: project }
---
# ghcr pull secret (dockerconfigjson) so the cluster pulls the private
# claude-pod image. Same GitHub token (has read:packages).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull
  namespace: claude-pods
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-claude-pods
    kind: SecretStore
  target:
    name: ghcr-pull
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{ .username }}","password":"{{ .token }}","auth":"{{ printf "%s:%s" .username .token | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef: { key: claude-pods/git, property: username }
    - secretKey: token
      remoteRef: { key: claude-pods/git, property: token }
