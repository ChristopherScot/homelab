# S3 creds for CNPG (Barman) to continuously back up vaultwarden-db to
# s3://cscot-homelab-pg-backups. Shared creds from kv/cnpg-backups/s3.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-db-backup-s3
  namespace: vaultwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-vaultwarden
    kind: SecretStore
  target:
    name: vaultwarden-db-backup-s3
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef: { key: cnpg-backups/s3, property: access_key_id }
    - secretKey: ACCESS_SECRET_KEY
      remoteRef: { key: cnpg-backups/s3, property: secret_access_key }
