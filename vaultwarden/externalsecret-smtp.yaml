# SES SMTP transport creds (shared kv/ses/smtp) templated into the env-var
# names Vaultwarden expects. Sender is hardcoded per-app (presentation, not
# a credential). Vaultwarden uses STARTTLS on 587 -> SMTP_SECURITY=starttls.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-smtp
  namespace: vaultwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-vaultwarden
    kind: SecretStore
  target:
    name: vaultwarden-smtp
    template:
      type: Opaque
      data:
        SMTP_HOST: "{{ .host }}"
        SMTP_PORT: "{{ .port }}"
        SMTP_SECURITY: "starttls"
        SMTP_USERNAME: "{{ .username }}"
        SMTP_PASSWORD: "{{ .password }}"
        SMTP_FROM: "vaultwarden@chrisscotmartin.com"
        SMTP_FROM_NAME: "Vaultwarden"
  data:
    - secretKey: host
      remoteRef: { key: ses/smtp, property: host }
    - secretKey: port
      remoteRef: { key: ses/smtp, property: port }
    - secretKey: username
      remoteRef: { key: ses/smtp, property: username }
    - secretKey: password
      remoteRef: { key: ses/smtp, property: password }
