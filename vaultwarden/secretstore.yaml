# Vault SecretStore for the vaultwarden namespace. Uses the same
# kubernetes-auth pattern as the other apps; requires a Vault role
# `vaultwarden` bound to the external-secrets-sa SA in this namespace
# (created out-of-band via the vault-policies bootstrap, like authelia).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-vaultwarden
  namespace: vaultwarden
spec:
  provider:
    vault:
      server: http://vault.default.svc.cluster.local:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: vaultwarden
          serviceAccountRef:
            name: external-secrets-sa
