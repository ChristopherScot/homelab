# Postgres backend for Vaultwarden. 2 instances for failover (same
# rationale as grafana-db — avoid single-point SQLite-on-Longhorn).
# CNPG generates a `vaultwarden-db-app` secret in the vaultwarden ns with
# connection creds (host/port/dbname/user/password/uri).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vaultwarden-db
  namespace: vaultwarden
spec:
  instances: 2
  postgresql:
    parameters:
      # Low-write vault + daily base backups → ship WAL at most hourly
      # (vs the 5-min default) to cut S3 PUT churn ~12x. ~1h recovery
      # granularity is fine for a password store.
      archive_timeout: "3600s"
  storage:
    size: 2Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  bootstrap:
    initdb:
      database: vaultwarden
      owner: vaultwarden
  # Continuous backup to S3 (Barman) — offsite copy of the password vault.
  # s3://cscot-homelab-pg-backups/vaultwarden. Creds from the
  # vaultwarden-db-backup-s3 secret (ExternalSecret ← kv/cnpg-backups/s3).
  backup:
    barmanObjectStore:
      destinationPath: "s3://cscot-homelab-pg-backups/vaultwarden"
      s3Credentials:
        accessKeyId:
          name: vaultwarden-db-backup-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: vaultwarden-db-backup-s3
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
    retentionPolicy: "30d"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: vaultwarden-db-daily
  namespace: vaultwarden
spec:
  # CNPG 6-field cron (sec min hour dom mon dow) — 04:30 daily.
  schedule: "0 30 4 * * *"
  backupOwnerReference: self
  cluster:
    name: vaultwarden-db
