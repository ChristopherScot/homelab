# Vaultwarden secrets from Vault kv/vaultwarden:
#   admin_token  — argon2 PHC hash gating the /admin panel (generate with
#                  `vaultwarden hash` or `openssl rand -base64 48` + hash).
# DB creds come from the CNPG-generated vaultwarden-db-app secret, not here.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-secrets
  namespace: vaultwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-vaultwarden
    kind: SecretStore
  target:
    name: vaultwarden-secrets
  data:
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: vaultwarden
        property: admin_token
