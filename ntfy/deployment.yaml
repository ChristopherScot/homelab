apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ntfy-data
  namespace: ntfy
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: ntfy
  annotations:
    reloader.stakater.com/auto: "true"   # roll on config/secret change
spec:
  replicas: 1
  strategy:
    type: Recreate          # RWO volume (SQLite auth/cache db)
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.23.0
          args: ["serve"]
          env:
            - name: TZ
              value: America/New_York
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/ntfy
              readOnly: true
            - name: data
              mountPath: /var/lib/ntfy
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet: { path: /v1/health, port: 80 }
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /v1/health, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: ntfy-server-config
            items:
              - key: server.yml
                path: server.yml
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: ntfy
spec:
  selector:
    app: ntfy
  ports:
    - port: 80
      targetPort: 80
