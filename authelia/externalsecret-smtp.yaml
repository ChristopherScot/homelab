# Pulls SES SMTP credentials from Vault into a Secret consumed by Authelia.
#
# The Vault path `kv/ses/smtp` holds shared SMTP credentials usable by any
# service (the IAM user `ses-smtp-homelab` is scoped to ses:SendEmail on
# chrisscotmartin.com, not Authelia-specific). Vault role `authelia` gets
# read access to `kv/data/ses/*` via vault-policies.sh.
#
# Authelia consumes these as env vars (AUTHELIA_NOTIFIER_SMTP_*) injected via
# envFrom in deployment.yaml. The corresponding values in configuration.yml
# are omitted so the env-var overrides take effect.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authelia-smtp
  namespace: authelia
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-authelia
    kind: SecretStore
  target:
    name: authelia-smtp
    template:
      type: Opaque
      data:
        # Authelia expects: submission://host:port for STARTTLS (port 587)
        AUTHELIA_NOTIFIER_SMTP_ADDRESS: "submission://{{ .host }}:{{ .port }}"
        AUTHELIA_NOTIFIER_SMTP_USERNAME: "{{ .username }}"
        AUTHELIA_NOTIFIER_SMTP_PASSWORD: "{{ .password }}"
        AUTHELIA_NOTIFIER_SMTP_SENDER: "Authelia <{{ .sender }}>"
  data:
    - secretKey: host
      remoteRef:
        key: ses/smtp
        property: host
    - secretKey: port
      remoteRef:
        key: ses/smtp
        property: port
    - secretKey: username
      remoteRef:
        key: ses/smtp
        property: username
    - secretKey: password
      remoteRef:
        key: ses/smtp
        property: password
    - secretKey: sender
      remoteRef:
        key: ses/smtp
        property: sender
