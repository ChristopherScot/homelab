apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: authelia
  labels:
    app: authelia
  annotations:
    # Authelia doesn't watch its config file; needs restart on changes.
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: authelia
  template:
    metadata:
      labels:
        app: authelia
    spec:
      # k8s auto-injects AUTHELIA_PORT_* env vars for the authelia Service in
      # this namespace. Authelia parses any AUTHELIA_* env as a config key, and
      # AUTHELIA_PORT collides with our explicit server.address. Disable.
      enableServiceLinks: false
      containers:
        - name: authelia
          image: authelia/authelia:4.39.19
          args:
            - --config
            - /config/configuration.yml
          ports:
            - containerPort: 9091
              name: http
          env:
            # Enables {{ secret "..." }} templating in configuration.yml.
            - name: X_AUTHELIA_CONFIG_FILTERS
              value: template
          envFrom:
            - secretRef:
                name: authelia-keys
          volumeMounts:
            - name: config
              mountPath: /config/configuration.yml
              subPath: configuration.yml
            - name: users
              mountPath: /config/users
              readOnly: true
            - name: oidc-secrets
              mountPath: /config/secrets
              readOnly: true
            - name: db
              mountPath: /config/db
            - name: notifications
              mountPath: /config/notifications
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: authelia-config
        - name: users
          secret:
            secretName: authelia-users
        - name: oidc-secrets
          secret:
            secretName: authelia-keys
            items:
              - key: oidc_jwks.pem
                path: oidc_jwks.pem
              - key: oidc_vault_client_secret_hashed
                path: oidc_vault_client_secret_hashed
        - name: db
          persistentVolumeClaim:
            claimName: authelia-db
        # Authelia writes notifications (e.g. 2FA QR codes when SMTP isn't
        # configured) to a file. emptyDir is fine — kubectl logs/exec recovers.
        - name: notifications
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: authelia
  namespace: authelia
spec:
  selector:
    app: authelia
  ports:
    - name: http
      port: 80
      targetPort: 9091
