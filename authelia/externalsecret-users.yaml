apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authelia-users
  namespace: authelia
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-authelia
    kind: SecretStore
  target:
    name: authelia-users
    template:
      type: Opaque
      data:
        users_database.yml: "{{ .yaml }}"
  data:
    - secretKey: yaml
      remoteRef:
        key: authelia/users
        property: yaml
