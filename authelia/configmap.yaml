apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: authelia
data:
  configuration.yml: |
    # Authelia configuration. Secret keys come from env (authelia-keys Secret).
    # Users + password hashes come from a mounted file (authelia-users Secret).

    server:
      address: tcp://0.0.0.0:9091
      buffers:
        read: 4096
        write: 4096

    log:
      level: info
      format: json

    theme: dark

    totp:
      issuer: home.chrisscotmartin.com
      period: 30
      skew: 1

    authentication_backend:
      file:
        path: /config/users/users_database.yml
        password:
          algorithm: argon2id

    access_control:
      default_policy: deny
      rules:
        # Jellyseerr + Readarr: anyone in users group (admins are also
        # in users). Note: Jellyfin's ingress intentionally bypasses
        # Authelia entirely — TVs/Roku/AppleTV/mobile clients can't
        # follow the redirect-and-cookie flow. Jellyfin's own auth gates
        # access there.
        - domain:
            - seerr.home.chrisscotmartin.com
            - readarr.home.chrisscotmartin.com
            - books.home.chrisscotmartin.com
            - shelfmark.home.chrisscotmartin.com
          policy: one_factor
          subject:
            - "group:users"

        # Admin tools: admins only, with 2FA.
        - domain:
            - sonarr.home.chrisscotmartin.com
            - radarr.home.chrisscotmartin.com
            - prowlarr.home.chrisscotmartin.com
            - bazarr.home.chrisscotmartin.com
            - qbit.home.chrisscotmartin.com
            - grafana.home.chrisscotmartin.com
          policy: two_factor
          subject:
            - "group:admins"

    session:
      # session.secret comes from AUTHELIA_SESSION_SECRET env (Authelia maps
      # underscored env vars to nested config keys at startup).
      cookies:
        - domain: home.chrisscotmartin.com
          authelia_url: https://auth.home.chrisscotmartin.com
          default_redirection_url: https://seerr.home.chrisscotmartin.com
      inactivity: 1h
      expiration: 12h
      remember_me: 1M
      redis:
        host: redis.authelia.svc.cluster.local
        port: 6379

    regulation:
      max_retries: 3
      find_time: 2m
      ban_time: 5m

    storage:
      # storage.encryption_key comes from AUTHELIA_STORAGE_ENCRYPTION_KEY env.
      local:
        path: /config/db/db.sqlite3

    identity_validation:
      reset_password:
        # jwt_secret comes from AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET
        # env (set in deployment.yaml).

    notifier:
      # Sends 2FA enrollment, password reset, and security alert emails via
      # AWS SES. Connection details (address/username/password/sender) come
      # from the authelia-smtp Secret as AUTHELIA_NOTIFIER_SMTP_* env vars
      # (see externalsecret-smtp.yaml).
      #
      # Authelia performs an SMTP startup check; if SES is unreachable or
      # auth fails on boot, the pod will fail to become Ready. Disable the
      # check with `disable_startup_check: true` if that's a problem.
      smtp:
        timeout: 10s
        identifier: 'authelia.home.chrisscotmartin.com'
        subject: '[Authelia] {title}'
        # SES startup check sends a no-op message to validate auth. Use a
        # verified-recipient address so it works even if we ever drop back
        # to SES sandbox mode.
        startup_check_address: 'me@chrisscotmartin.com'

    identity_providers:
      oidc:
        # hmac_secret comes from AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET env.
        # jwks key + client_secret are read from files via the `template` filter
        # (enabled by X_AUTHELIA_CONFIG_FILTERS=template in deployment.yaml).
        jwks:
          - key_id: default
            algorithm: RS256
            use: sig
            key: {{ secret "/config/secrets/oidc_jwks.pem" | mindent 14 "|" | msquote }}
        authorization_policies:
          # Vault is admin-only and limited to chris specifically. Layered with
          # bound_claims on the Vault OIDC role for defense in depth.
          vault_admin:
            default_policy: deny
            rules:
              - policy: two_factor
                subject:
                  - "user:chris"
        claims_policies:
          # Authelia defaults to a privacy-focused behavior where identity
          # claims live only at the UserInfo endpoint, not in the ID Token.
          # Vault's OIDC plugin reads user_claim/groups_claim from the ID
          # Token, so for the Vault client we include them inline.
          vault:
            id_token_audience_mode: specification
            id_token:
              - preferred_username
              - groups
              - email
        clients:
          - client_id: vault
            client_name: Vault
            client_secret: '{{ secret "/config/secrets/oidc_vault_client_secret_hashed" }}'
            public: false
            authorization_policy: vault_admin
            claims_policy: vault
            redirect_uris:
              - https://vault.home.chrisscotmartin.com/ui/vault/auth/oidc/oidc/callback
              - https://vault.home.chrisscotmartin.com/oidc/callback
            scopes:
              - openid
              - profile
              - groups
              - email
            userinfo_signed_response_alg: none
            token_endpoint_auth_method: client_secret_basic
