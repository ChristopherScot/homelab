apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: picoshare-data
  namespace: picoshare
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi          # SQLite holds the file blobs; sized for sends
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: picoshare
  namespace: picoshare
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate            # RWO volume — never two pods at once
  selector:
    matchLabels:
      app: picoshare
  template:
    metadata:
      labels:
        app: picoshare
    spec:
      containers:
        - name: picoshare
          image: mtlynch/picoshare:1.5.1
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: PS_BEHIND_PROXY
              value: "true"        # correct client IPs in logs (behind ingress)
            # Admin shared secret + Litestream S3 creds from Vault.
            - name: PS_SHARED_SECRET
              valueFrom: { secretKeyRef: { name: picoshare-secrets, key: PS_SHARED_SECRET } }
            - name: LITESTREAM_ACCESS_KEY_ID
              valueFrom: { secretKeyRef: { name: picoshare-secrets, key: LITESTREAM_ACCESS_KEY_ID } }
            - name: LITESTREAM_SECRET_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: picoshare-secrets, key: LITESTREAM_SECRET_ACCESS_KEY } }
            - name: LITESTREAM_BUCKET
              valueFrom: { secretKeyRef: { name: picoshare-secrets, key: LITESTREAM_BUCKET } }
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet: { path: /, port: 4001 }
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /, port: 4001 }
            initialDelaySeconds: 5
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: picoshare-data
---
apiVersion: v1
kind: Service
metadata:
  name: picoshare
  namespace: picoshare
spec:
  selector:
    app: picoshare
  ports:
    - port: 80
      targetPort: 4001
