# Vault wiring for PicoShare. The `picoshare` Vault role grants read on
# kv/picoshare/*. ExternalSecret pulls the admin shared-secret + the
# Litestream S3 creds into env-var-shaped keys.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: picoshare
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-picoshare
  namespace: picoshare
spec:
  provider:
    vault:
      server: http://vault.default.svc.cluster.local:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: picoshare
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: picoshare-secrets
  namespace: picoshare
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-picoshare
    kind: SecretStore
  target:
    name: picoshare-secrets
    template:
      type: Opaque
      data:
        PS_SHARED_SECRET: "{{ .shared_secret }}"
        # Litestream replicates the SQLite DB to S3 (built into the image).
        LITESTREAM_ACCESS_KEY_ID: "{{ .ls_key }}"
        LITESTREAM_SECRET_ACCESS_KEY: "{{ .ls_secret }}"
        LITESTREAM_BUCKET: "{{ .ls_bucket }}"
  data:
    - secretKey: shared_secret
      remoteRef: { key: picoshare/config, property: shared_secret }
    - secretKey: ls_key
      remoteRef: { key: picoshare/config, property: litestream_access_key_id }
    - secretKey: ls_secret
      remoteRef: { key: picoshare/config, property: litestream_secret_access_key }
    - secretKey: ls_bucket
      remoteRef: { key: picoshare/config, property: litestream_bucket }
