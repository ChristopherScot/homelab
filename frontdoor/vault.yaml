apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Vault"
    gethomepage.dev/description: "Secrets store"
    gethomepage.dev/group: "Cluster"
    gethomepage.dev/icon: "hashicorp-vault.png"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: external
  tls:
    - hosts:
        - vault.home.chrisscotmartin.com
      secretName: vault-tls
  rules:
    - host: vault.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
    - host: vault.home.chrisscotmartin.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
