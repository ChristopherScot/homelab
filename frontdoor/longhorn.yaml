apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn-ingress
  namespace: longhorn-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    gethomepage.dev/enabled: "true"
    gethomepage.dev/pod-selector: "app=longhorn-ui"
    gethomepage.dev/href: "https://longhorn.home.chrisscotmartin.com"
    gethomepage.dev/name: "Longhorn"
    gethomepage.dev/description: "Block storage UI"
    gethomepage.dev/group: "Cluster"
    gethomepage.dev/icon: "longhorn.png"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: 10000m
spec:
  ingressClassName: external
  tls:
    - hosts:
        - longhorn.home.chrisscotmartin.com
      secretName: longhorn-tls
  rules:
    - host: longhorn.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
    - host: longhorn.home.chrisscotmartin.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
