# Reverse-proxy entry for the Synology NAS at 192.168.50.220:5001 (DSM HTTPS).
# The NAS lives outside the cluster, so we declare a Service with no selector
# and a matching EndpointSlice that points directly at its LAN IP. ingress-nginx
# then proxies https://nas.home.chrisscotmartin.com -> https://192.168.50.220:5001.
# We use :5001 because DSM redirects :5000 -> :5001 with an absolute Location,
# which would bounce the browser off the ingress and onto the NAS directly.

apiVersion: v1
kind: Service
metadata:
  name: nas
  namespace: default
spec:
  ports:
    - name: dsm
      port: 5001
      protocol: TCP
      targetPort: 5001
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: nas
  namespace: default
  labels:
    kubernetes.io/service-name: nas
addressType: IPv4
ports:
  - name: dsm
    port: 5001
    protocol: TCP
endpoints:
  - addresses:
      - 192.168.50.220
    # Endpoint controller writes empty {} after creation; declaring it
    # explicitly here keeps ArgoCD from reporting the EndpointSlice as
    # OutOfSync forever.
    conditions: {}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nas-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    gethomepage.dev/enabled: "true"
    gethomepage.dev/kubernetes-status: "false"
    gethomepage.dev/name: "Synology NAS"
    gethomepage.dev/description: "DSM web admin"
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/icon: "synology-dsm.png"
    # Talk HTTPS to DSM upstream; its self-signed cert is fine because we are
    # on the LAN and not verifying.
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    # DSM uses WebSockets for live notifications, file uploads, terminal, etc.
    # Bumped read/send timeouts so long-poll connections don't get killed.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Allow large uploads through DSM's File Station.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: external
  tls:
    - hosts:
        - nas.home.chrisscotmartin.com
      secretName: nas-tls
  rules:
    - host: nas.home.chrisscotmartin.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nas
                port:
                  number: 5001
