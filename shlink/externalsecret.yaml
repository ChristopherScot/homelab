# Pulls the Shlink initial API key from Vault (kv/shlink, field api-key)
# into a k8s secret the deployment mounts as INITIAL_API_KEY. Uses the
# cluster-wide vault-backend store, same as other apps.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: shlink-api
  namespace: shlink
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: shlink-api
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: shlink
        property: api-key
