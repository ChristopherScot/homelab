# Corefile for the redundant secondary resolvers. These serve the homelab
# zone authoritatively and forward everything else upstream. They are the
# failover for Pi-hole (no ad-blocking here — resolution resilience only).
#
# All *.home.chrisscotmartin.com services sit behind the nginx ingress at
# 192.168.50.225; the DNS appliances have their own IPs. A wildcard via the
# `template` plugin keeps this self-maintaining (new services resolve with
# no record upkeep), mirroring the intent of Pi-hole's host list.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-secondary
  namespace: coredns-secondary
data:
  Corefile: |
    # Appliance records get their OWN zone blocks (more specific zones win
    # in CoreDNS), so the *.home wildcard template can't override them.
    pihole.home.chrisscotmartin.com {
        template IN A pihole.home.chrisscotmartin.com {
            answer "{{ .Name }} 60 IN A 192.168.50.230"
        }
        template IN AAAA pihole.home.chrisscotmartin.com { rcode NOERROR }
    }
    # The HA CoreDNS endpoint (single VIP, both pods behind it).
    dns.home.chrisscotmartin.com {
        template IN A dns.home.chrisscotmartin.com {
            answer "{{ .Name }} 60 IN A 192.168.50.232"
        }
        template IN AAAA dns.home.chrisscotmartin.com { rcode NOERROR }
    }

    # Everything else *.home (incl. bare apex) -> the nginx ingress LB.
    home.chrisscotmartin.com {
        template IN A home.chrisscotmartin.com {
            match "home\.chrisscotmartin\.com\.$"
            answer "{{ .Name }} 60 IN A 192.168.50.225"
        }
        # Answer AAAA with an empty NODATA (no IPv6) instead of erroring —
        # clients query AAAA alongside A; without this they get SERVFAIL +
        # log spam.
        template IN AAAA home.chrisscotmartin.com {
            match "home\.chrisscotmartin\.com\.$"
            rcode NOERROR
        }
        log
        errors
    }

    # Everything else: recurse via public upstreams. Plain DNS to both
    # (mixed providers can't share one tls_servername; reliability over
    # upstream encryption for a failover resolver). Cache to cut latency.
    . {
        forward . 1.1.1.1 8.8.8.8 {
            health_check 5s
        }
        cache 30
        loop
        health        # :8080/health  (liveness probe)
        ready         # :8181/ready   (readiness probe)
        log
        errors
    }
