# Creds for the paperless-mail-ingest CronJob: the bucket-scoped AWS IAM
# user (reads/deletes inbound email from S3) + a Paperless API token (POSTs
# documents). Both live in Vault kv/paperless/*; the paperless Vault role
# already grants read on kv/paperless/*.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: paperless-s3-inbound
  namespace: paperless
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-paperless
    kind: SecretStore
  target:
    name: paperless-s3-inbound
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: paperless/s3-inbound, property: access_key_id }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: paperless/s3-inbound, property: secret_access_key }
    - secretKey: S3_BUCKET
      remoteRef: { key: paperless/s3-inbound, property: bucket }
    - secretKey: S3_PREFIX
      remoteRef: { key: paperless/s3-inbound, property: prefix }
    - secretKey: AWS_DEFAULT_REGION
      remoteRef: { key: paperless/s3-inbound, property: region }
    - secretKey: PAPERLESS_API_TOKEN
      remoteRef: { key: paperless/config, property: api_token }
