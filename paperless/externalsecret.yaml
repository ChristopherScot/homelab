# Paperless secrets from Vault kv/paperless:
#   secret_key      — PAPERLESS_SECRET_KEY (Django secret; rand 50+ chars)
#   redis_password  — shared with the bundled redis subchart via the
#                     paperless-redis existingSecret (key: redis-password)
#   admin_password  — initial superuser password (PAPERLESS_ADMIN_PASSWORD)
# DB creds come from the CNPG paperless-db-app secret, not here.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: paperless-secrets
  namespace: paperless
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-paperless
    kind: SecretStore
  target:
    name: paperless-secrets
  data:
    - secretKey: PAPERLESS_SECRET_KEY
      remoteRef:
        key: paperless/config
        property: secret_key
    - secretKey: PAPERLESS_ADMIN_PASSWORD
      remoteRef:
        key: paperless/config
        property: admin_password
---
# Separate secret in the exact shape the bundled bitnami redis subchart
# expects (key MUST be `redis-password`). Referenced via
# redis.auth.existingSecret in the Helm values — required because Argo
# runs helm template and can't use the chart's auto-generated password.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: paperless-redis
  namespace: paperless
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-paperless
    kind: SecretStore
  target:
    name: paperless-redis
  data:
    - secretKey: redis-password
      remoteRef:
        key: paperless/config
        property: redis_password
