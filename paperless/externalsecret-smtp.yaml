# SES SMTP transport creds (shared kv/ses/smtp) templated into Paperless's
# PAPERLESS_EMAIL_* env-var names. Sender hardcoded per-app. SES uses
# STARTTLS on 587 -> PAPERLESS_EMAIL_USE_TLS=true.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: paperless-smtp
  namespace: paperless
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-paperless
    kind: SecretStore
  target:
    name: paperless-smtp
    template:
      type: Opaque
      data:
        PAPERLESS_EMAIL_HOST: "{{ .host }}"
        PAPERLESS_EMAIL_PORT: "{{ .port }}"
        PAPERLESS_EMAIL_HOST_USER: "{{ .username }}"
        PAPERLESS_EMAIL_HOST_PASSWORD: "{{ .password }}"
        PAPERLESS_EMAIL_USE_TLS: "true"
        PAPERLESS_EMAIL_FROM: "paperless@chrisscotmartin.com"
  data:
    - secretKey: host
      remoteRef: { key: ses/smtp, property: host }
    - secretKey: port
      remoteRef: { key: ses/smtp, property: port }
    - secretKey: username
      remoteRef: { key: ses/smtp, property: username }
    - secretKey: password
      remoteRef: { key: ses/smtp, property: password }
