# Two ingresses on paperless.home, split by path:
#   - main (/)    Authelia-gated browser access (group:users, 2FA) + the
#                 homepage tile. Forwards Remote-User for SSO.
#   - api (/api)  auth-EXEMPT so the mobile app authenticates with a
#                 Paperless API token (it can't follow Authelia's redirect).
#                 Protected by Paperless's own per-user revocable tokens;
#                 tailnet-only. Shares the paperless-tls cert (issued by main).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paperless
  namespace: paperless
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 64m
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Paperless"
    gethomepage.dev/description: "Document management & OCR"
    gethomepage.dev/group: "Productivity"
    gethomepage.dev/icon: "paperless-ngx.png"
    gethomepage.dev/pod-selector: "app=paperless"
    nginx.ingress.kubernetes.io/auth-url: "http://authelia.authelia.svc.cluster.local/api/verify"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.home.chrisscotmartin.com/?rd=$scheme://$host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header X-Forwarded-Method $request_method;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Forwarded-For $remote_addr;
    nginx.ingress.kubernetes.io/auth-response-headers: "Remote-User,Remote-Name,Remote-Email,Remote-Groups"
  labels:
    app: paperless
spec:
  ingressClassName: external
  tls:
    - hosts: [paperless.home.chrisscotmartin.com]
      secretName: paperless-tls
  rules:
    - host: paperless.home.chrisscotmartin.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paperless-web
                port: {number: 80}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paperless-api
  namespace: paperless
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 64m
  labels:
    app: paperless
spec:
  ingressClassName: external
  tls:
    - hosts: [paperless.home.chrisscotmartin.com]
      secretName: paperless-tls
  rules:
    - host: paperless.home.chrisscotmartin.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: paperless-web
                port: {number: 80}
