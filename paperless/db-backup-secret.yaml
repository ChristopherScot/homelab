# S3 creds for CNPG (Barman) to continuously back up paperless-db to
# s3://cscot-homelab-pg-backups. Shared creds from kv/cnpg-backups/s3;
# CNPG's barmanObjectStore references this secret's keys by name.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: paperless-db-backup-s3
  namespace: paperless
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-paperless
    kind: SecretStore
  target:
    name: paperless-db-backup-s3
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef: { key: cnpg-backups/s3, property: access_key_id }
    - secretKey: ACCESS_SECRET_KEY
      remoteRef: { key: cnpg-backups/s3, property: secret_access_key }
