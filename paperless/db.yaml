# Postgres backend for Paperless-ngx. Own 2-instance CNPG cluster
# (per-app model). Paperless is write-heavy on ingest (OCR results,
# full-text index metadata), so a robust DB matters more here than for
# most apps. CNPG generates paperless-db-app secret in this namespace.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-db
  namespace: paperless
spec:
  instances: 2
  storage:
    size: 5Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  bootstrap:
    initdb:
      database: paperless
      owner: paperless
