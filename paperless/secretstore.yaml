# Vault SecretStore for the paperless namespace. Requires a Vault
# kubernetes-auth role `paperless` bound to external-secrets-sa in this
# namespace (created out-of-band, like the authelia/vaultwarden roles).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-paperless
  namespace: paperless
spec:
  provider:
    vault:
      server: http://vault.default.svc.cluster.local:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: paperless
          serviceAccountRef:
            name: external-secrets-sa
