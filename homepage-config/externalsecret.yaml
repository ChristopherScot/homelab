# Single Secret named `homepage-vars` with HOMEPAGE_VAR_* env keys. The
# Homepage Deployment mounts it via envFrom (see app-of-apps/apps/homepage.yaml),
# and ingress annotations reference these as {{HOMEPAGE_VAR_*}} for widget
# config. Keeps API keys out of ingress YAML and out of git.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homepage-vars
  namespace: homepage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homepage
    kind: SecretStore
  target:
    name: homepage-vars
    template:
      type: Opaque
      data:
        HOMEPAGE_VAR_SONARR_KEY:       "{{ .sonarr_key }}"
        HOMEPAGE_VAR_RADARR_KEY:       "{{ .radarr_key }}"
        HOMEPAGE_VAR_PROWLARR_KEY:     "{{ .prowlarr_key }}"
        HOMEPAGE_VAR_READARR_KEY:      "{{ .readarr_key }}"
        HOMEPAGE_VAR_BAZARR_KEY:       "{{ .bazarr_key }}"
        HOMEPAGE_VAR_JELLYFIN_KEY:     "{{ .jellyfin_key }}"
        HOMEPAGE_VAR_JELLYSEERR_KEY:   "{{ .jellyseerr_key }}"
        HOMEPAGE_VAR_QBITTORRENT_USER: "{{ .qbittorrent_user }}"
        HOMEPAGE_VAR_QBITTORRENT_PASS: "{{ .qbittorrent_pass }}"
  data:
    - secretKey: sonarr_key
      remoteRef: { key: arr/api-keys, property: sonarr }
    - secretKey: radarr_key
      remoteRef: { key: arr/api-keys, property: radarr }
    - secretKey: prowlarr_key
      remoteRef: { key: arr/api-keys, property: prowlarr }
    - secretKey: readarr_key
      remoteRef: { key: arr/api-keys, property: readarr }
    - secretKey: bazarr_key
      remoteRef: { key: arr/api-keys, property: bazarr }
    - secretKey: jellyfin_key
      remoteRef: { key: jellyfin/admin, property: api_key }
    # Jellyseerr key path is provisional — currently kv/jellyseerr/api-key.api_key.
    # Adjust if you stored it under a different field/path.
    - secretKey: jellyseerr_key
      remoteRef: { key: jellyseerr/api-key, property: api_key }
    - secretKey: qbittorrent_user
      remoteRef: { key: qbittorrent/admin, property: username }
    - secretKey: qbittorrent_pass
      remoteRef: { key: qbittorrent/admin, property: password }
