# Snapshot controller — implements the CSI VolumeSnapshot control loop.
# Watches VolumeSnapshot CRs and dynamically provisions matching
# VolumeSnapshotContent + invokes the underlying CSI driver (Longhorn).
#
# Single replica for homelab; if you ever care about HA control-plane
# components, bump to 2 and let leader election handle failover.
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: snapshot-controller
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: snapshot-controller
  # The controller won't go ready if the v1 CRDs aren't yet present.
  # 35s gives the CRDs (applied alongside) time to install.
  minReadySeconds: 35
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snapshot-controller
    spec:
      serviceAccountName: snapshot-controller
      containers:
        - name: snapshot-controller
          image: registry.k8s.io/sig-storage/snapshot-controller:v8.4.0
          args:
            - "--v=2"
            # Single replica — leader election is dead weight (Lease churn,
            # slower startup). Re-enable if bumping replicas for HA.
            - "--leader-election=false"
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
