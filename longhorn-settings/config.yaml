apiVersion: longhorn.io/v1beta1
kind: Setting
metadata:
  name: backup-target
  namespace: longhorn-system
value: nfs://192.168.50.77:/media/chris/node2-hdd
---
apiVersion: longhorn.io/v1beta1
kind: Setting
metadata:
  name: default-replica-count
  namespace: longhorn-system
value: "2"
---
apiVersion: longhorn.io/v1beta1
kind: RecurringJob
metadata:
  name: auto-snapshot
  namespace: longhorn-system
spec:
  cron: "0 */6 * * *"
  task: "snapshot"
  groups:
  - default
  retain: 8
  concurrency: 2
  labels:
    app: longhorn
    type: auto-snapshot
---
apiVersion: longhorn.io/v1beta1
kind: RecurringJob
metadata:
  name: auto-backup
  namespace: longhorn-system
spec:
  cron: "0 3 * * 0"
  task: "backup"
  groups:
  - default
  retain: 4
  concurrency: 2
  labels:
    app: longhorn
    type: auto-backup
