# NFS backup target. In Longhorn >=1.9 the legacy `backup-target` Setting
# is rejected ("not supported") — backup targets are now BackupTarget CRs.
# This `default` CR replaces the old Setting (Argo was looping on the
# rejected Setting every reconcile, spamming the webhook). The S3 offsite
# target lives in s3-backup-target.yaml.
apiVersion: longhorn.io/v1beta2
kind: BackupTarget
metadata:
  name: default
  namespace: longhorn-system
spec:
  backupTargetURL: nfs://192.168.50.77:/media/chris/node2-hdd
  pollInterval: 5m0s
---
apiVersion: longhorn.io/v1beta2
kind: Setting
metadata:
  name: default-replica-count
  namespace: longhorn-system
value: "2"
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: auto-snapshot
  namespace: longhorn-system
spec:
  cron: "0 */6 * * *"
  task: "snapshot"
  groups:
  - default
  retain: 8
  concurrency: 2
  labels:
    app: longhorn
    type: auto-snapshot
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: auto-backup
  namespace: longhorn-system
spec:
  cron: "0 3 * * 0"
  task: "backup"
  groups:
  - default
  retain: 4
  concurrency: 2
  labels:
    app: longhorn
    type: auto-backup
