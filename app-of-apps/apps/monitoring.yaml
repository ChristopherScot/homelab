# Kubernetes monitoring via the grafana/k8s-monitoring helm chart (v4) —
# Alloy collectors ship pod logs, cluster events, and cluster metrics to
# the in-cluster VictoriaMetrics + Loki destinations. Grafana Cloud was
# retired; this stack is local-only now.
#
# Chart shape: `destinations:` (object map) + per-feature `enabled` and
# `collector` blocks; collectors must be explicitly enabled too.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    # 1. ServiceAccount, SecretStore, ExternalSecret for pulling the token.
    - repoURL: https://github.com/ChristopherScot/homelab.git
      targetRevision: HEAD
      path: monitoring
    # 2. The Grafana k8s-monitoring chart, fed values inline.
    - repoURL: https://grafana.github.io/helm-charts
      chart: k8s-monitoring
      targetRevision: 4.0.3
      helm:
        releaseName: grafana-k8s-monitoring
        valuesObject:
          cluster:
            name: homelab

          # Destinations are an object map keyed by name in v4. Local only —
          # we used to dual-ship to Grafana Cloud, but the cloud stack and
          # all dependent secrets/tokens have been retired.
          destinations:
            # No auth on the local destinations — both are cluster-internal
            # ClusterIP services in the same namespace as the collectors.
            local-metrics:
              type: prometheus
              url: http://victoria-metrics.monitoring.svc.cluster.local:8428/api/v1/write
              auth:
                type: none

            local-logs:
              type: loki
              url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
              auth:
                type: none

          # ---- Features: enabled ----
          clusterMetrics:
            enabled: true
            collector: alloy-metrics

          clusterEvents:
            enabled: true
            collector: alloy-singleton

          # Drop ingress-nginx (single biggest source on most clusters) and
          # kube-system (CNI / kube-proxy chatter) at the agent so they never
          # count against ingest.
          podLogsViaLoki:
            enabled: true
            collector: alloy-logs
            excludeNamespaces:
              - ingress-nginx
              - kube-system

          # Pick up any ServiceMonitor/PodMonitor/Probe CR in any namespace.
          # Apps express their own scrape config rather than us hand-rolling
          # Alloy stanzas per app. CRDs are already installed cluster-wide.
          prometheusOperatorObjects:
            enabled: true
            collector: alloy-metrics

          # Also scrape pods/services that opt in with the legacy
          # prometheus.io/scrape annotation set. Covers the arr-stack apps
          # that don't ship Prometheus Operator CRs.
          annotationAutodiscovery:
            enabled: true
            collector: alloy-metrics

          # OTLP receiver disabled — chart validation requires a traces
          # destination once enabled, and we have no local Tempo to receive
          # them after cutting Grafana Cloud. Re-enable + add a Tempo
          # destination if/when we instrument apps with OpenTelemetry.
          applicationObservability:
            enabled: false
          autoInstrumentation:
            enabled: false
          profiling:
            enabled: false
          profilesReceiver:
            enabled: false
          costMetrics:
            enabled: false
          hostMetrics:
            enabled: false

          # ---- Collectors ----
          # alloy-metrics: single-replica deployment avoids the clustering
          # requirement that the chart enforces on daemonset/multi-replica
          # metrics collectors. Fine for a homelab.
          collectors:
            alloy-metrics:
              enabled: true
              controller:
                type: deployment
                replicas: 1
            alloy-singleton:
              enabled: true
            alloy-logs:
              enabled: true
              presets:
                - filesystem-log-reader
                - daemonset

          # kube-state-metrics is required by clusterMetrics; the chart
          # deploys it as a sub-chart here.
          telemetryServices:
            kube-state-metrics:
              deploy: true
            node-exporter:
              deploy: false
            windows-exporter:
              deploy: false
            kepler:
              deploy: false
            opencost:
              deploy: false
