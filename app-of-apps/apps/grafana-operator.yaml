# Grafana Operator — manages GrafanaDashboard / Grafana / GrafanaDatasource
# CRDs and reconciles them against a Grafana instance (in our case the
# external Grafana Cloud at chrisscotmartin.grafana.net). Each dashboard
# becomes a YAML-wrapped first-class k8s object that can sit next to the
# rest of our infra-as-code.
#
# Operator install: just the controller, no Grafana instance (we use the
# external SaaS one). The Grafana CR + GrafanaDashboard CRs live alongside
# everything else under monitoring/ and are picked up by the existing
# `monitoring` Argo app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  source:
    # Grafana Operator publishes its Helm chart to the GitHub Container
    # Registry as an OCI artifact. Argo supports OCI-typed Helm sources
    # natively — no extra repo registration needed. Chart version is the
    # plain release number (no `v` prefix) even though the operator's
    # appVersion is `vX.Y.Z`.
    repoURL: ghcr.io/grafana/helm-charts
    chart: grafana-operator
    targetRevision: 5.22.2
    helm:
      releaseName: grafana-operator
      valuesObject:
        # Single replica is fine; the operator is leader-elected so
        # n>1 just adds standby pods.
        replicas: 1
        # namespaceScope=false (the default) makes the operator watch
        # all namespaces, so GrafanaDashboard CRs can live wherever
        # makes sense alongside the app they describe.
        namespaceScope: false
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
