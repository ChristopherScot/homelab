apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.11.0
    helm:
      releaseName: external-secrets
      values: |
        # Quiet the controller and webhooks down — info-level chatters
        # success-status JSON for every poll, ~150 lines/min when there
        # are several SecretStores. Errors still surface at warn+.
        log:
          level: warn
        webhook:
          log:
            level: warn
        certController:
          log:
            level: warn
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
