apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arr-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/ChristopherScot/homelab'
    targetRevision: HEAD
    path: arr-stack
    directory:
      recurse: true
      # _charts/ holds Helm templates with Go templating, not raw manifests.
      # values.yaml files under apps/ are inputs to those templates, also not
      # raw manifests. Per-app chart-driven Argo Applications consume them.
      exclude: '{_charts/**,apps/**/values.yaml}'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
