apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          # Don't claim the default IngressClass — we use `external` (frontdoor/class.yaml).
          ingressClassResource:
            default: false
            name: nginx
          ingressClass: nginx

          # Required for the arr-stack ingresses' auth-snippet annotation
          # (forward-auth headers to Authelia). Without these two the
          # snippets are silently dropped on apply.
          config:
            allow-snippet-annotations: "true"
            annotations-risk-level: Critical

          service:
            type: LoadBalancer
            externalTrafficPolicy: Local
            annotations:
              # Pin the LB IP so existing DNS records keep resolving.
              metallb.universe.tf/loadBalancerIPs: "192.168.50.225"

          # Disable admission webhook for the initial adoption — the
          # certificate Job from the chart conflicts with whatever the
          # legacy install put in place. Re-enable once the chart owns
          # the namespace cleanly.
          admissionWebhooks:
            enabled: true
            patch:
              enabled: true

          watchIngressWithoutClass: false

          # Resource requests/limits — small, this is just a controller.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
