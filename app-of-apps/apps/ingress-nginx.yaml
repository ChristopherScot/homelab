apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          ingressClassResource:
            default: false
            name: nginx
          ingressClass: nginx
          config:
            allow-snippet-annotations: "true"
            annotations-risk-level: Critical
          service:
            type: LoadBalancer
            externalTrafficPolicy: Local
            annotations:
              metallb.universe.tf/loadBalancerIPs: "192.168.50.225"
          admissionWebhooks:
            enabled: true
            patch:
              enabled: true
          watchIngressWithoutClass: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
