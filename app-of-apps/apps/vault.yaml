apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.29.1
    helm:
      releaseName: vault
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
  ignoreDifferences:
    # Defer to the StatefulSet controller for fields it manages (controller
    # injects defaults like restartPolicy, dnsPolicy, schedulerName,
    # persistentVolumeClaimRetentionPolicy, revisionHistoryLimit, etc.).
    # Without this, ArgoCD reports vault as OutOfSync forever.
    - group: apps
      kind: StatefulSet
      name: vault
      namespace: default
      managedFieldsManagers:
        - kube-controller-manager
