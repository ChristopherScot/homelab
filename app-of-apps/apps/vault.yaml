apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.29.1
    helm:
      releaseName: vault
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # Note: not using ServerSideApply here. SSA + ignoreDifferences with
  # managedFieldsManagers has known bugs in argocd <= 2.13 (see argo-cd
  # issues #20178, #11106, #9071). The jsonPointers form below works
  # reliably without SSA.
  ignoreDifferences:
    # k8s controller defaults injected on the live StatefulSet that aren't
    # in chart 0.29.1's rendered manifest.
    - group: apps
      kind: StatefulSet
      name: vault
      namespace: default
      jsonPointers:
        - /spec/persistentVolumeClaimRetentionPolicy
        - /spec/revisionHistoryLimit
        - /spec/template/spec/dnsPolicy
        - /spec/template/spec/restartPolicy
        - /spec/template/spec/schedulerName
        - /spec/template/spec/serviceAccount
    # Container-level defaults (terminationMessagePath/Policy, empty
    # resources{}, ordering differences in env/ports) and volume-mount
    # ordering differences. These are entirely live-state noise.
    - group: apps
      kind: StatefulSet
      name: vault
      namespace: default
      jqPathExpressions:
        - .spec.template.spec.containers[].terminationMessagePath
        - .spec.template.spec.containers[].terminationMessagePolicy
        - .spec.template.spec.containers[].resources
        - .spec.volumeClaimTemplates
    # vault-agent-injector self-rotates its webhook CA bundle. The chart
    # ships caBundle: "" and vault-k8s writes the real cert at startup.
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: vault-agent-injector-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
