apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperless
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Hand-rolled manifests (no Helm chart). gabe565 was stuck at Paperless
  # 2.14.7 (mobile app rejected the API version) and the wrenix chart's
  # existing-secret env handling is broken — so we own the manifests:
  # deployment.yaml (image pinned to current), ingress.yaml, plus the
  # existing db.yaml / redis.yaml / externalsecret*.yaml / mail-ingest /
  # sync-trigger in the same path.
  source:
    repoURL: 'https://github.com/ChristopherScot/homelab'
    targetRevision: HEAD
    path: paperless
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: paperless
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
