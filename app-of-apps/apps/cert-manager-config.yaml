apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ChristopherScot/homelab'
    targetRevision: HEAD
    path: cert-manager-config
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # NB: not using ServerSideApply. SSA + ignoreDifferences with
    # managedFieldsManagers has known bugs (argo-cd #20178, #11106, #9071).
    # Plain client-side apply with explicit jsonPointers works reliably.
  ignoreDifferences:
    # cert-manager controller normalizes the ClusterIssuer spec after we apply:
    # - injects empty preferredChain default
    # - strips namespace from secretAccessKeySecretRef (implicit on ClusterIssuer)
    - group: cert-manager.io
      kind: ClusterIssuer
      jsonPointers:
        - /spec/acme/preferredChain
      jqPathExpressions:
        - .spec.acme.solvers[].dns01.route53.secretAccessKeySecretRef.namespace
