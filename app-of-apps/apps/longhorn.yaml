apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
  project: default
  sources:
  - chart: longhorn
    repoURL: https://charts.longhorn.io/
    targetRevision: v1.7.2
    helm:
      valuesObject:
        preUpgradeChecker:
          jobEnabled: false
        # The csi-snapshotter sidecar spams ~200 forbidden-CRD errors per
        # cycle because external-snapshotter CRDs aren't installed on this
        # cluster (we don't use VolumeSnapshot). Setting replicas to 0 stops
        # the sidecar Deployment entirely.
        # https://github.com/longhorn/longhorn/issues/2459
        csi:
          snapshotterReplicaCount: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
