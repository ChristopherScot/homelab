apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
  # longhorn-manager re-asserts the default StorageClass from the
  # longhorn-storageclass ConfigMap (it only *creates* the SC if absent, never
  # updates it — longhorn/longhorn#3821) and forces reclaimPolicy: Delete, which
  # is immutable. Argo's reapply then fails and the app sits OutOfSync forever
  # (longhorn/longhorn#9391). On top of that, Argo does byte-exact comparison of
  # ConfigMap .data, so the block-scalar trailing newline in the rendered
  # storageclass.yaml keeps the ConfigMap perpetually OutOfSync. Ignore the
  # manager-owned SC fields AND the ConfigMap data so the app can report Synced.
  # To actually change numberOfReplicas: edit the ConfigMap and delete the SC so
  # the manager recreates it (the chart value alone can't update an existing SC).
  ignoreDifferences:
  - group: storage.k8s.io
    kind: StorageClass
    name: longhorn
    jsonPointers:
    - /parameters
    - /reclaimPolicy
  - kind: ConfigMap
    name: longhorn-storageclass
    namespace: longhorn-system
    jsonPointers:
    - /data
  project: default
  sources:
  - chart: longhorn
    repoURL: https://charts.longhorn.io/
    targetRevision: v1.9.2
    helm:
      valuesObject:
        # Enabled for the staged 1.7→1.8→1.9 upgrade so Longhorn's own
        # pre-upgrade check job validates safety before each hop. Can go
        # back to false once on the target version.
        preUpgradeChecker:
          jobEnabled: true
        # Bake numberOfReplicas=2 into the longhorn StorageClass. The global
        # default-replica-count Setting (=2) is overridden by the SC's own
        # parameter, which defaults to 3 — so PVCs using storageClassName:
        # longhorn were silently getting 3 replicas and sitting degraded
        # (the 3rd can't place). This aligns the SC with the global setting.
        persistence:
          defaultClassReplicaCount: 2
        # The csi-snapshotter sidecar spams ~200 forbidden-CRD errors per
        # cycle because external-snapshotter CRDs aren't installed on this
        # cluster (we don't use VolumeSnapshot). Setting replicas to 0 stops
        # the sidecar Deployment entirely.
        # https://github.com/longhorn/longhorn/issues/2459
        csi:
          snapshotterReplicaCount: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
