apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/ChristopherScot/homelab'
    targetRevision: HEAD
    path: app-of-apps/apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      # selfHeal but NOT prune — auto-applies new/changed Application CRs
      # so leaf apps get their spec updates without manual triggers, but a
      # bad commit (deleted/malformed yaml) can't cascade-delete child
      # Applications. Manual prune via the Argo UI when truly retiring an
      # Application from app-of-apps/apps/.
      selfHeal: true
