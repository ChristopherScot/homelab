apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-cert-manager
  namespace: cert-manager
spec:
  provider:
    vault:
      server: http://vault.default.svc.cluster.local:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: cert-manager
          serviceAccountRef:
            name: external-secrets-sa
