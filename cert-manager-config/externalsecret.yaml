apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: route53-credentials
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-cert-manager
    kind: SecretStore
  target:
    name: route53-credentials
  data:
    - secretKey: secret-access-key
      remoteRef:
        key: cert-manager/route53
        property: secret_access_key
